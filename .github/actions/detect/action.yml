name: 'Detect languages'
description: >-
  Repo-only helper for the reusable testing-conventions workflow: detect which languages
  (and conditions) are present under a path and emit them as step outputs. NOT part of the
  published testing-conventions tool — it exists only in this repository and carries its own
  integration + e2e tests (see tests/). The workflow calls it as a composite action so the
  script is available without checking out this repo into the consumer's workspace.

inputs:
  languages:
    description: 'JSON array restricting which languages to check; empty (the default) auto-detects every supported language present under `path`.'
    required: false
    default: ''
  path:
    description: 'Directory scanned recursively for sources.'
    required: false
    default: 'src'
  config:
    description: 'Config file passed to `--config`; the default is refined to a package-root testing-conventions.toml when one exists there (#277).'
    required: false
    default: 'testing-conventions.toml'

outputs:
  languages:
    description: 'JSON array of present python/typescript languages (the co-change matrix — rust units are inline, so co-change does not apply).'
    value: ${{ steps.scan.outputs.languages }}
  colocated_test_languages:
    description: 'Present languages plus rust when a crate is present (the whole-tree colocated-test matrix — the rust arm checks inline `#[cfg(test)]` presence, #274).'
    value: ${{ steps.scan.outputs.colocated_test_languages }}
  integration_lint_languages:
    description: 'Present languages plus rust (the integration-lint matrix).'
    value: ${{ steps.scan.outputs.integration_lint_languages }}
  isolation_languages:
    description: 'Present languages plus rust (the unit-lint matrix).'
    value: ${{ steps.scan.outputs.isolation_languages }}
  coverage_languages:
    description: 'Present languages, plus rust when a crate is present (Rust coverage is zero-config, #206).'
    value: ${{ steps.scan.outputs.coverage_languages }}
  mutation_languages:
    description: 'The `unit mutation` matrix (#204): the same set as coverage_languages, now that all three arms are at parity.'
    value: ${{ steps.scan.outputs.mutation_languages }}
  packaging_dist:
    description: 'true when a conventional dist/ holding a built distribution is discoverable at the derived package_root (#280).'
    value: ${{ steps.scan.outputs.packaging_dist }}
  e2e_attestation:
    description: 'true when a committed e2e-attestation.json sits at the checkout root.'
    value: ${{ steps.scan.outputs.e2e_attestation }}
  package_root:
    description: 'The derived package root (#277): the nearest directory at-or-above `path` holding a package.json / pyproject.toml / Cargo.toml, else the checkout root (`.`).'
    value: ${{ steps.scan.outputs.package_root }}
  ts_package_manager:
    description: 'The TypeScript package manager at `package_root`: its packageManager field, else pnpm/npm by lockfile, else pnpm.'
    value: ${{ steps.scan.outputs.ts_package_manager }}
  python_env:
    description: 'The Python environment model at `package_root`: uv when pyproject.toml declares a [project] table, else pip.'
    value: ${{ steps.scan.outputs.python_env }}
  provision_rust:
    description: 'true when the package_root manifest declares a Rust-compiling build (a Cargo.toml, a maturin build-backend, or a napi config) — lets the suite jobs provision cargo with no `rust_toolchain` input.'
    value: ${{ steps.scan.outputs.provision_rust }}
  config:
    description: 'The config file to pass to `--config` (#277): the `config` input verbatim unless it is the default, in which case a package-root testing-conventions.toml wins if present.'
    value: ${{ steps.scan.outputs.config }}
  build_command:
    description: 'The `build_command` declaration (#289, #335) read from the primary language table of the discovered config file, or empty when none is declared — the suite-executing jobs run it before the suite.'
    value: ${{ steps.scan.outputs.build_command }}
  packaging_build:
    description: 'The distribution build the packaging job runs before scanning (#335), derived from the package root manifest: `uv build` for a Python project, `<pm> pack --pack-destination dist` for a TypeScript package, `cargo package` for a crate — or empty when the manifest structurally cannot state one.'
    value: ${{ steps.scan.outputs.packaging_build }}
  packaging_language:
    description: 'The primary language whose toolchain the packaging job provisions to run `packaging_build` (#335), or empty when no build was derived — the job then falls back to a committed dist.'
    value: ${{ steps.scan.outputs.packaging_language }}
  e2e_extra_scope:
    description: 'The `[e2e].extra_scope` freshness roots (#333) read from the discovered config file, rendered as repeated `--extra-scope <dir>` arguments the e2e-verify job appends, or empty when none are declared — a shared source tree beside the package that no `--scope` can reach.'
    value: ${{ steps.scan.outputs.e2e_extra_scope }}
  e2e_exclude:
    description: 'The `[e2e].exclude` feature-gated subtrees (#333) read from the discovered config file, rendered as repeated `--exclude <dir>` arguments the e2e-verify job appends, or empty when none are declared.'
    value: ${{ steps.scan.outputs.e2e_exclude }}

runs:
  using: composite
  steps:
    - id: scan
      shell: bash
      env:
        LANGUAGES: ${{ inputs.languages }}
        SCAN_PATH: ${{ inputs.path }}
        CONFIG: ${{ inputs.config }}
      # `$GITHUB_ACTION_PATH` is this action's directory — `.github/actions/detect`, three
      # levels below the checkout root of whichever ref is resolved (the action's own repo,
      # fetched whether it's used locally via `./.github/actions/detect` or by a consumer via
      # `owner/repo/.github/actions/detect@ref`). The action manifest stays here (the `uses:`
      # contract every consumer pins), but the detect logic itself lives in `internals/detect`
      # (#363) alongside its own tests and dogfood gate — this walks back up to that checkout
      # root to find it, rather than keeping the Python source colocated with the manifest.
      run: python3 "$GITHUB_ACTION_PATH/../../../internals/detect/src/detect.py"
