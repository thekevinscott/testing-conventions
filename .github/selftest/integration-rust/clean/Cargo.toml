# Clean self-test crate `gadget`: its integration test runs first-party code for
# real and doubles only an external crate. Parsed by `syn` (never compiled), so the
# deps need not resolve; `[workspace]` keeps it standalone.
[package]
name = "gadget"
version = "0.0.0"
edition = "2021"

[dependencies]
rand = "0.8"

[dev-dependencies]
mockall = "0.13"
mockall_double = "0.3"

[workspace]
