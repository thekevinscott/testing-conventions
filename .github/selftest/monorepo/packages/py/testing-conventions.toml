# Fixture-local config for the monorepo selftest (#277): no root manifest, so
# every gate must be driven by the derived package root.

# Point.shift is straight-line arithmetic with no branches; the default
# python coverage floor requires branch coverage, which the tool correctly
# treats as a misconfigured run when zero branches are measured rather than
# a vacuous pass. This fixture exists to prove package-root wiring, not to
# exercise branch coverage, so it opts out explicitly.
[python.coverage]
branch = false
