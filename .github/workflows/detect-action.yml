name: Detect action (tests)

# Red/green tests for the repo-only detect helper. The detect logic used to live as inline bash
# in the reusable workflow with no real tests; it now lives in internals/detect/src/detect.py
# (#363, moved from .github/actions/detect/detect.py) and is covered here by integration tests
# (the filesystem mocked) and e2e tests (the real filesystem), run with pytest. This is the gate
# that goes red before a behavior change lands and green after it. `action.yml` itself stays at
# .github/actions/detect/ — the composite-action `uses:` contract every consumer pins is
# unchanged — so this trigger watches both locations.

on:
  pull_request:
    paths:
      - 'internals/detect/**'
      - '.github/actions/detect/action.yml'
      - '.github/workflows/detect-action.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: detect.py — integration + e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Unit + integration + e2e tests
        # uv layers pytest into an ephemeral environment and runs the suite from disk — no pip.
        # detect.py is stdlib-only, so pytest is the only dependency; `internals/detect`'s own
        # `[tool.pytest.ini_options] pythonpath = ["src"]` still puts it on the import path.
        run: uv run --with pytest --no-project python -m pytest internals/detect/ -v --import-mode=importlib

  action:
    name: action.yml — end-to-end (local use)
    # pytest covers detect.py directly; this covers the composite action's own wiring
    # (inputs → env → detect.py → step outputs) by *using* it locally, the way the
    # reusable workflow will once it's released. Uses `./.github/actions/detect`, which
    # resolves here because this repo is the checkout.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Stage a fixture (rust crate under path; dist/ and attestation at the package root)
        run: |
          set -euo pipefail
          mkdir -p detect-fixture/src detect-fixture/dist
          printf '[package]\nname = "x"\n' > detect-fixture/Cargo.toml
          echo 'pub fn f() {}' > detect-fixture/src/lib.rs
          : > detect-fixture/dist/x-0.1.0-py3-none-any.whl
          echo '{}' > detect-fixture/e2e-attestation.json
      - id: detect
        uses: ./.github/actions/detect
        with:
          languages: ''
          path: detect-fixture
          caller_repository: thekevinscott/testing-conventions
      - name: Assert the action's outputs
        env:
          LINT: ${{ steps.detect.outputs.integration_lint_languages }}
          COLOC: ${{ steps.detect.outputs.colocated_test_languages }}
          PKG: ${{ steps.detect.outputs.packaging_dist }}
          ATT: ${{ steps.detect.outputs.e2e_attestation }}
          PKGROOT: ${{ steps.detect.outputs.package_root }}
          TSPM: ${{ steps.detect.outputs.ts_package_manager }}
          PYENV: ${{ steps.detect.outputs.python_env }}
          PROVRUST: ${{ steps.detect.outputs.provision_rust }}
          CARGOTARGETDIR: ${{ steps.detect.outputs.cargo_target_dir }}
          CONFIG: ${{ steps.detect.outputs.config }}
          BUILDCMD: ${{ steps.detect.outputs.build_command }}
          CLICMD: ${{ steps.detect.outputs.cli_command }}
          TSADAPTER: ${{ steps.detect.outputs.ts_mutation_adapter_args }}
        run: |
          set -euo pipefail
          echo "integration_lint_languages=$LINT colocated_test_languages=$COLOC packaging_dist=$PKG e2e_attestation=$ATT package_root=$PKGROOT ts_package_manager=$TSPM python_env=$PYENV provision_rust=$PROVRUST cargo_target_dir=$CARGOTARGETDIR config=$CONFIG build_command=$BUILDCMD cli_command=$CLICMD ts_mutation_adapter_args=$TSADAPTER"
          [ "$LINT" = '["rust"]' ]  || { echo "::error::expected rust auto-detected, got $LINT"; exit 1; }
          [ "$COLOC" = '["rust"]' ] || { echo "::error::expected rust in the colocated-test matrix (#274), got $COLOC"; exit 1; }
          [ "$PKG" = "true" ]      || { echo "::error::expected packaging_dist=true, got $PKG"; exit 1; }
          [ "$ATT" = "true" ]      || { echo "::error::expected e2e_attestation=true, got $ATT"; exit 1; }
          # #277: detect-fixture carries a Cargo.toml (a manifest) at the scan root itself, so
          # the package root is the fixture dir, and its Cargo.toml auto-provisions rust; no
          # package.json/pyproject.toml means the ts/python defaults hold. No
          # testing-conventions.toml sits in detect-fixture/, so config falls back to the
          # repo-root default.
          [ "$PKGROOT" = "detect-fixture" ] || { echo "::error::expected package_root=detect-fixture, got $PKGROOT"; exit 1; }
          [ "$TSPM" = "pnpm" ]     || { echo "::error::expected ts_package_manager=pnpm (default), got $TSPM"; exit 1; }
          [ "$PYENV" = "pip" ]     || { echo "::error::expected python_env=pip (default), got $PYENV"; exit 1; }
          [ "$PROVRUST" = "true" ] || { echo "::error::expected provision_rust=true (Cargo.toml present), got $PROVRUST"; exit 1; }
          # #410: detect-fixture's own Cargo.toml has no ancestor [workspace] table, so it's not
          # a workspace member — cargo_target_dir stays at its own package root, unredirected.
          [ "$CARGOTARGETDIR" = "detect-fixture/target" ] || { echo "::error::expected cargo_target_dir=detect-fixture/target, got $CARGOTARGETDIR"; exit 1; }
          [ "$CONFIG" = "testing-conventions.toml" ] || { echo "::error::expected config=testing-conventions.toml (no package-root file), got $CONFIG"; exit 1; }
          # #289: no testing-conventions.toml in detect-fixture/, so no [python].build_command
          # is discoverable — the output is empty (byte-identical to the old no-build default).
          [ -z "$BUILDCMD" ] || { echo "::error::expected build_command empty (no config with the key), got $BUILDCMD"; exit 1; }
          # #356: caller_repository was passed above as this repo's own name with no `version`,
          # so the action must derive the hermetic path — the exact wiring bug (inputs.
          # caller_repository never reaching detect.py's env) that let every rule job silently
          # fall back to npx with no red signal anywhere.
          [ "$CLICMD" = "./hermetic-cli/testing-conventions" ] || { echo "::error::expected cli_command=./hermetic-cli/testing-conventions (caller_repository wired through), got '$CLICMD'"; exit 1; }
          [ "$TSADAPTER" = "--ts-mutation-adapter ./hermetic-cli/dist/mutation/main.js" ] || { echo "::error::expected ts_mutation_adapter_args wired through, got '$TSADAPTER'"; exit 1; }
          echo "action.yml glue OK"
