name: Dogfood (.github helpers)

# Hold this repo's own .github/ helper scripts to the same conventions we enforce on every
# shipped package (#237): move_major_tag.py (the rolling-tag helper) is first-party Python with
# real logic, so it earns colocated tests, isolation, coverage, integration-lint, and the
# diff-scoped mutation gate like anything else. detect.py moved to internals/detect/ (#363) — a
# real uv package now dogfooded through the shipped reusable workflow (dogfood.yml) instead of
# here, per the same reasoning #321 moved the checks helpers: a pyproject.toml inside this scan
# would flip the conventions tool into package-mode for the whole directory.
#
# Scoped to the helper *code* — .github/scripts/ — and deliberately NOT:
#   - .github/selftest/**  : intentional negative fixtures (below-floor, surviving mutants,
#                            un-colocated reds) that the rules are *supposed* to fire on;
#   - .github/workflows/** : YAML, nothing to scan.
# A true repo-root scan would need a detection exclude/ignore mechanism (the root is full of
# negative fixtures + generated trees); that is its own work, tracked separately.
#
# Runs the published binary via npx, exactly like the dogfood / consumer path.

on:
  pull_request:
    paths:
      - '.github/scripts/**'
      - '.github/workflows/dogfood-github-helpers.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conventions:
    name: Conventions over the .github helper scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # `unit mutation --base` diffs `<base>...HEAD`, so the base ref must be reachable.
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v6
      - name: Enforce the conventions on the helper scripts
        # The Python arms that apply to loose first-party scripts: a colocated unit test per
        # source, unit-suite isolation, the coverage floor, the integration mocking lint, and
        # mutation on the changed lines — diff-scoped (`--base`) exactly like the packages'
        # gate, since whole-tree mutation is too slow to gate. (Packaging / e2e-attestation
        # don't apply here.) Collect every failure, then fail.
        #
        # `npx testing-conventions` is the deliberate consumer path this job dogfoods. The
        # mutation arm spawns `python3 -m testing_conventions.mutation.main` (#248), though, and
        # PYTHONPATH resolves that adapter from source — the PR's code, not the released wheel —
        # while uv layers the engines (coverage, pytest, cosmic-ray) onto the `python3` npx spawns.
        env:
          PYTHONPATH: ${{ github.workspace }}/packages/python/python
        run: |
          set -uo pipefail
          fail=0
          for dir in .github/scripts; do
            for rule in "unit colocated-test" "unit lint" "unit coverage" "integration lint" "unit mutation --base origin/main"; do
              echo "::group::testing-conventions $rule --language python $dir"
              if ! uv run --with coverage --with pytest --with cosmic-ray --no-project npx -y testing-conventions $rule --language python "$dir"; then
                echo "::error::\`$rule\` failed for $dir"
                fail=1
              fi
              echo "::endgroup::"
            done
          done
          exit $fail
