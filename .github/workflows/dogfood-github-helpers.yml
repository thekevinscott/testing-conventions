name: Dogfood (.github helpers)

# Hold this repo's own loose .github/scripts/ helpers to the same conventions we enforce on
# every shipped package (#237): move_major_tag.py (the rolling-tag helper) and the not-yet-
# migrated #302 checks are first-party Python with real logic, so they earn colocated tests,
# isolation, coverage, integration-lint, and the diff-scoped mutation gate like anything else.
#
# detect.py (the detect composite action's source) moved to internals/detect (#363), gated by
# detect-action.yml's own pytest run instead — its colocated unit tests deliberately don't reach
# 100% alone (compute_outputs is integration/e2e-tested by design), so it doesn't fit the shipped
# reusable workflow's unit-coverage gate the way internals/checks does. `.github/actions/` now
# holds only composite-action manifests (YAML), nothing to scan, so it's dropped from the loop
# below.
#
# Scoped to the helper *code* — .github/scripts/ — and deliberately NOT:
#   - .github/selftest/**  : intentional negative fixtures (below-floor, surviving mutants,
#                            un-colocated reds) that the rules are *supposed* to fire on;
#   - .github/workflows/** : YAML, nothing to scan.
# A true repo-root scan would need a detection exclude/ignore mechanism (the root is full of
# negative fixtures + generated trees); that is its own work, tracked separately.
#
# Runs the published binary via npx, exactly like the dogfood / consumer path.

on:
  pull_request:
    paths:
      - '.github/scripts/**'
      - '.github/workflows/dogfood-github-helpers.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  conventions:
    name: Conventions over the .github helper scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # `unit mutation --base` diffs `<base>...HEAD`, so the base ref must be reachable.
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install the Python toolchain (coverage, pytest, and the mutation adapter)
        # The mutation arm spawns the adapter shipped in the testing-conventions wheel
        # (`python3 -m testing_conventions.mutation.main`, #248) — installing the wheel
        # provides it and brings cosmic-ray.
        run: python -m pip install --quiet coverage pytest testing-conventions
      - name: Enforce the conventions on the helper scripts
        # The Python arms that apply to loose first-party scripts: a colocated unit test per
        # source, unit-suite isolation, the coverage floor, the integration mocking lint, and
        # mutation on the changed lines — diff-scoped (`--base`) exactly like the packages'
        # gate, since whole-tree mutation is too slow to gate. (Packaging / e2e-attestation
        # don't apply here.) Collect every failure, then fail.
        run: |
          set -uo pipefail
          fail=0
          for dir in .github/scripts; do
            for rule in "unit colocated-test" "unit lint" "unit coverage" "integration lint" "unit mutation --base origin/main"; do
              echo "::group::testing-conventions $rule --language python $dir"
              if ! npx -y testing-conventions $rule --language python "$dir"; then
                echo "::error::\`$rule\` failed for $dir"
                fail=1
              fi
              echo "::endgroup::"
            done
          done
          exit $fail
