name: Dogfood (.github helpers)

# Hold this repo's own .github/ helper scripts to the same conventions we enforce on every
# shipped package (#237): detect.py (the detect composite action) and move_major_tag.py (the
# rolling-tag helper) are first-party Python with real logic, so they earn colocated tests,
# isolation, coverage, and integration-lint like anything else.
#
# Scoped to the helper *code* — .github/actions/ + .github/scripts/ — and deliberately NOT:
#   - .github/selftest/**  : intentional negative fixtures (below-floor, surviving mutants,
#                            un-colocated reds) that the rules are *supposed* to fire on;
#   - .github/workflows/** : YAML, nothing to scan.
# A true repo-root scan would need a detection exclude/ignore mechanism (the root is full of
# negative fixtures + generated trees); that is its own work, tracked separately.
#
# Runs the published binary via npx, exactly like the dogfood / consumer path.

on:
  pull_request:
    paths:
      - '.github/actions/**'
      - '.github/scripts/**'
      - '.github/workflows/dogfood-github-helpers.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  conventions:
    name: Conventions over the .github helper scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install the Python unit-coverage toolchain
        run: python -m pip install --quiet coverage pytest
      - name: Enforce the conventions on the helper scripts
        # The Python arms that apply to loose first-party scripts: a colocated unit test per
        # source, unit-suite isolation, the coverage floor, and the integration mocking lint.
        # (Packaging / e2e-attestation don't apply here.) Collect every failure, then fail.
        run: |
          set -uo pipefail
          fail=0
          for dir in .github/actions .github/scripts; do
            for rule in "unit colocated-test" "unit lint" "unit coverage" "integration lint"; do
              echo "::group::testing-conventions $rule --language python $dir"
              if ! npx -y testing-conventions $rule --language python "$dir"; then
                echo "::error::\`$rule\` failed for $dir"
                fail=1
              fi
              echo "::endgroup::"
            done
          done
          exit $fail
