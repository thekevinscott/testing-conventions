name: Dogfood

# testing-conventions enforcing its own conventions on its own packages (#30),
# now including by consuming the *shipped reusable workflow* over our own source
# (#175), not just the CLI directly.
#
#   conventions   — `uses:` the reusable workflow (the exact file consumers pin to
#                   @v0) over packages/python, zero-config (no `with:` beyond the
#                   path). packages/python ships a wheel but carries no `.py`, so
#                   every language's jobs are *skipped, not failed* (#94) — the
#                   dogfooding case the detect-skip was built for, proven here on
#                   our real package. (This obsoletes the old note that "Python has
#                   no source → coverage can't pass": #94's detect-skip handles it,
#                   so we can finally point the reusable workflow at our own tree.)
#                   A planted `.py` without a colocated test would flip it red.
#   colocated-test — TS colocated-test over packages/node/src (bin.ts has a
#                   colocated bin.test.ts). The shipped reusable workflow's own
#                   `colocated-test` job, scoped to just this gate via `gates` — it's
#                   a static check (parses source, never installs or runs the suite),
#                   so the TS coverage job's package-manager assumptions (#56, resolved
#                   by #278's manifest-derived `ts_package_manager`) never applied here
#                   to begin with. Rust uses inline `#[cfg(test)]`, out of scope for the
#                   file-based rule.
#   e2e-verify    — dogfoods the e2e attestation nudge (#71): packages/node carries a
#                   tests/e2e suite and a committed e2e-attestation.json, and CI runs
#                   the reusable workflow's own `e2e-verify` job, scoped to `packages/node`
#                   via `path` — the in-repo whole-hog proof for this gate (#281). Before
#                   #281 this had to be a bespoke job (build the CLI from source, `cd
#                   packages/node`) because the reusable workflow's e2e-verify job could
#                   only check the checkout root, not a package subdirectory. NOTE: the
#                   reusable job runs the *published* `testing-conventions` binary via
#                   `npx`, and the `e2e verify <path>` argument only exists once a release
#                   carries #281 — so right after #281 merges (before the next release
#                   publishes it and `@v0` moves), this job runs the old binary against
#                   the new workflow's `<path>` argument and fails with an unrecognized-
#                   argument error until that release goes out (see internals/repo.md,
#                   "Self-test and the `@v0` path").

on:
  pull_request:
    paths:
      - 'packages/node/**'
      - 'packages/python/**'
      - 'internals/checks/**'
      - 'internals/detect/**'
      - '.github/workflows/dogfood.yml'
      # Re-run the dogfood whenever the reusable workflow it consumes changes.
      - '.github/workflows/testing-conventions.yml'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  conventions:
    name: Shipped reusable workflow over the Python plugin source
    # #175 / #218: consume our own shipped reusable workflow over a real package — the
    # Python plugin source under packages/python/python. Everything is unit-tested (the
    # pytest hook via its pluggy metadata, the coverage monkeypatch via an injected
    # module, the version shim via a forced import fallback), so it runs zero-config with
    # no exemptions. The published binary it runs is current (it auto-publishes on merge).
    uses: ./.github/workflows/testing-conventions.yml
    with:
      path: packages/python/python

  colocated-test:
    name: Colocated test (packages/node/src)
    uses: ./.github/workflows/testing-conventions.yml
    with:
      path: packages/node/src
      gates: '["colocated-test"]'

  e2e-verify:
    name: E2E attestation (packages/node)
    # #281: the shipped reusable workflow's own e2e-verify job, scoped to packages/node
    # via `path` and to just this gate via `gates` — replaces the old bespoke
    # build-from-source job now that the reusable workflow's e2e-verify job accepts a
    # package subdirectory instead of only the checkout root.
    uses: ./.github/workflows/testing-conventions.yml
    with:
      path: packages/node
      gates: '["e2e-verify"]'

  checks:
    name: Shipped reusable workflow over the self-test checks package
    # #321: the repo-only self-test checks are a uv package (internals/checks), so they're
    # dogfooded through the shipped reusable workflow like any other package — colocated test,
    # isolation, coverage, integration-lint, and diff-scoped mutation. This replaces running the
    # `.github/scripts` helper conventions over them as loose scripts (a pyproject inside the
    # `.github/scripts` scan flips the tool into package-mode for the whole directory).
    #
    # `path` is the *inner* importable-package dir (internals/checks/src), not the package root
    # — exactly as the Python plugin scans packages/python/python, not packages/python. The
    # static gates recurse `path`, so the colocated `*_test.py` units live under src/ while the
    # full e2e suite sits at internals/checks/tests/e2e (a sibling, outside the scan) — a
    # `*_test.py` e2e file inside the scan would be read as an un-isolated unit test. The
    # package root (internals/checks, where the pyproject lives) is still derived for the
    # coverage/mutation venv.
    uses: ./.github/workflows/testing-conventions.yml
    with:
      path: internals/checks/src

  detect:
    name: Shipped reusable workflow over the detect action's source
    # #363: detect.py (the detect composite action's implementation) is a uv package
    # (internals/detect) for the same reason internals/checks is — dogfooded through the
    # shipped reusable workflow instead of the loose-script path (dogfood-github-helpers.yml),
    # which a pyproject.toml would otherwise break. `path` is the inner src/ dir, exactly like
    # the checks package above; the integration/e2e suites sit at internals/detect/tests/ as
    # siblings outside the scan. `.github/actions/detect/action.yml` is unaffected — the
    # composite-action `uses:` contract every consumer pins doesn't move (#363).
    uses: ./.github/workflows/testing-conventions.yml
    with:
      path: internals/detect/src
