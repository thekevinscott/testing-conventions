name: Dogfood

# testing-conventions enforcing its own conventions on its own packages (#30),
# now including by consuming the *shipped reusable workflow* over our own source
# (#175), not just the CLI directly.
#
#   conventions   — `uses:` the reusable workflow (the exact file consumers pin to
#                   @v0) over packages/python, zero-config (no `with:` beyond the
#                   path). packages/python ships a wheel but carries no `.py`, so
#                   every language's jobs are *skipped, not failed* (#94) — the
#                   dogfooding case the detect-skip was built for, proven here on
#                   our real package. (This obsoletes the old note that "Python has
#                   no source → coverage can't pass": #94's detect-skip handles it,
#                   so we can finally point the reusable workflow at our own tree.)
#                   A planted `.py` without a colocated test would flip it red.
#   colocated-test — TS colocated-test over packages/node/src (bin.ts has a
#                   colocated bin.test.ts). Kept a *direct* CLI call rather than the
#                   reusable workflow because that workflow's bundled TS coverage job
#                   installs deps with `pnpm install --frozen-lockfile` at the repo
#                   root, but our node package is npm-based and package-scoped — so
#                   it can't green-run there until the toolchain is config-driven
#                   (#56). Rust uses inline `#[cfg(test)]`, out of scope for the
#                   file-based rule.
#   e2e-verify    — dogfoods the e2e attestation nudge (#71): packages/node carries a
#                   tests/e2e suite and a committed e2e-attestation.json, and CI runs
#                   `e2e verify` to confirm the attestation names the package's latest
#                   code commit. Kept a direct, package-scoped call (cwd =
#                   packages/node) because the attestation lives in that subdir, not
#                   the repo root the reusable workflow's e2e-verify job checks.

on:
  pull_request:
    paths:
      - 'packages/node/**'
      - 'packages/python/**'
      - '.github/workflows/dogfood.yml'
      # Re-run the dogfood whenever the reusable workflow it consumes changes.
      - '.github/workflows/testing-conventions.yml'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  conventions:
    name: Shipped reusable workflow over packages/python (zero-config)
    # #175: consume our own shipped reusable workflow over a real package, zero-config.
    # Default languages, no config file — every job is skipped because packages/python
    # has no sources (#94), so the call is green; the published binary it runs is
    # current (it auto-publishes on merge).
    uses: ./.github/workflows/testing-conventions.yml
    with:
      path: packages/python

  colocated-test:
    name: Colocated test (packages/node/src)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # node/npx ship on ubuntu-latest; `-y` skips the install prompt.
      - name: Node (TypeScript) — packages/node/src
        run: npx -y testing-conventions unit colocated-test --language typescript packages/node/src

  e2e-verify:
    name: E2E attestation (packages/node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # `e2e verify` finds packages/node's latest code commit via `git log`,
          # so it needs full history — a shallow clone would miss it whenever
          # HEAD itself doesn't touch the package.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/rust
      - name: Build the CLI from source
        run: cargo build --release --bin testing-conventions
        working-directory: packages/rust
      # cwd = packages/node, so verify is scoped to that package: it passes only
      # when the committed e2e-attestation.json names the package's latest code
      # commit, and nudges to re-attest (exit 1) when the code has moved on.
      - name: Verify the e2e attestation is current
        run: ../rust/target/release/testing-conventions e2e verify
        working-directory: packages/node
