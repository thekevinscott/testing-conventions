name: Dogfood

# testing-conventions enforcing its own colocated-test convention on its own
# packages (issue #30), via the published CLI — the docs' "roll your own" path.
#
#   - Node (TypeScript): packages/node/src. `bin.ts` has a colocated bin.test.ts
#     (run in node.yml), so it passes the rule with no waiver.
#   - Python: packages/python. No `.py` sources yet, so it's green by vacuity —
#     wiring it now enforces the rule the day a source lands.
#
# Why the CLI and not the reusable workflow: that workflow bundles a mandatory
# coverage job for every requested language (#31, #80), and Python has no source
# for coverage to measure — so it can't pass there. colocated-test is the rule
# #30 asks for (coverage is deferred, #26). Rust uses inline `#[cfg(test)]`, out
# of scope for the file-based rule.
#
# The e2e-verify job (#71) dogfoods the e2e attestation nudge: packages/node
# carries a small tests/e2e suite and a committed e2e-attestation.json, and CI
# runs `e2e verify` to confirm the attestation names packages/node's latest code
# commit — going red if the code moved on without a re-attest. It builds the CLI
# from source (not the published `npx`) because `e2e verify` isn't published yet.

on:
  pull_request:
    paths:
      - 'packages/node/**'
      - 'packages/python/**'
      - '.github/workflows/dogfood.yml'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  colocated-test:
    name: Colocated test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # node/npx ship on ubuntu-latest; `-y` skips the install prompt.
      - name: Node (TypeScript) — packages/node/src
        run: npx -y testing-conventions unit colocated-test --language typescript packages/node/src
      - name: Python — packages/python
        run: npx -y testing-conventions unit colocated-test --language python packages/python

  e2e-verify:
    name: E2E attestation (packages/node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # `e2e verify` finds packages/node's latest code commit via `git log`,
          # so it needs full history — a shallow clone would miss it whenever
          # HEAD itself doesn't touch the package.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/rust
      - name: Build the CLI from source
        run: cargo build --release --bin testing-conventions
        working-directory: packages/rust
      # cwd = packages/node, so verify is scoped to that package: it passes only
      # when the committed e2e-attestation.json names the package's latest code
      # commit, and nudges to re-attest (exit 1) when the code has moved on.
      - name: Verify the e2e attestation is current
        run: ../rust/target/release/testing-conventions e2e verify
        working-directory: packages/node
