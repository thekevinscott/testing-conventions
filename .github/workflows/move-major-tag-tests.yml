name: Move major tag (tests)

# Red/green tests for the repo-only move-major-tag helper (.github/scripts/move-major-tag). The
# forward-only tag-advance logic lives in move_major_tag.py — not inline in move-major-tag.yml —
# so it carries integration tests (the git boundary mocked) and e2e tests (a real git repo with
# a local remote), run with pytest. This is the gate that goes red before the logic lands and
# green after. Mirrors detect-action.yml for the detect helper.

on:
  pull_request:
    paths:
      - '.github/scripts/move-major-tag/**'
      - '.github/workflows/move-major-tag-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: move_major_tag.py — integration + e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Unit + integration + e2e tests
        # uv layers pytest into an ephemeral environment and runs the suite from disk — no pip.
        run: uv run --with pytest --no-project python -m pytest .github/scripts/move-major-tag/ -v --import-mode=importlib
