name: Node

on:
  pull_request:
    paths:
      - 'packages/node/**'
      - 'packages/rust/**'
      - '.github/workflows/node.yml'

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/node
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/node
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run typecheck

  build:
    name: Build + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/rust
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Build rust binary
        run: cargo build --release
        working-directory: packages/rust
      - name: Build node package
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build
        working-directory: packages/node
      - name: Stage rust binary as platform optional dep
        run: |
          pkg=@testing-conventions/x86_64-unknown-linux-gnu
          target=packages/node/node_modules/$pkg
          mkdir -p "$target/bin"
          printf '{"name":"%s","version":"0.0.1"}\n' "$pkg" > "$target/package.json"
          install -m 755 packages/rust/target/release/testing-conventions "$target/bin/testing-conventions"
      - name: Smoke (--version via node wrapper -> rust binary)
        run: node packages/node/dist/bin.js --version
