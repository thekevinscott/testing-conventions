name: PR Monitor

on:
  pull_request:

permissions:
  checks: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  monitor:
    name: 'CI Gate'
    runs-on: ubuntu-latest
    steps:
      - uses: thekevinscott/pr-monitor@v1
        with:
          job-name: 'CI Gate'
