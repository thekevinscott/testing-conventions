name: Python

on:
  pull_request:
    paths:
      - 'packages/python/**'
      - 'packages/rust/**'
      - '.github/workflows/python.yml'

permissions:
  contents: read

jobs:
  build:
    name: Build wheel + smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/rust
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install maturin
      - name: Build wheel
        run: maturin build --release -o dist
        working-directory: packages/python
      - name: Install wheel + smoke (--version)
        run: |
          python -m venv .venv
          .venv/bin/pip install packages/python/dist/*.whl
          .venv/bin/testing-conventions --version
