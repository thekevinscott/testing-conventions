name: Python

on:
  pull_request:
    paths:
      - 'packages/python/**'
      - 'packages/rust/**'
      - '.github/workflows/python.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheel:
    name: Build wheel (once)
    # The package is maturin `bindings = "bin"` (packages/python/pyproject.toml): the wheel
    # ships the Rust binary with no per-Python-version native extension, so it builds to an
    # interpreter-agnostic `py3-none-*` tag (verified: `maturin build` produces
    # `testing_conventions-*-py3-none-manylinux_*.whl`, installs and runs identically under
    # 3.9-3.13). One Rust compile here, consumed by both `build` and `plugin` below, instead
    # of a redundant compile per matrix leg (#371, epic #366).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/rust
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v7
      - name: Build wheel
        # Builds through the manifest's pinned PEP 517 backend (maturin), which compiles in
        # release mode.
        run: uv build --wheel -o dist
        working-directory: packages/python
      - uses: actions/upload-artifact@v7
        with:
          name: python-wheel
          path: packages/python/dist/*.whl

  build:
    name: Install + smoke (py${{ matrix.python-version }})
    needs: build-wheel
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-wheel
          path: dist
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install wheel + smoke (--version)
        run: |
          python -m venv .venv
          .venv/bin/pip install dist/*.whl
          .venv/bin/testing-conventions --version

  plugin:
    name: Pytest plugin (py${{ matrix.python-version }})
    needs: build-wheel
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # 3.9 exercises the tomli fallback; 3.13 the stdlib tomllib path.
      matrix:
        python-version: ['3.9', '3.13']
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: python-wheel
          path: packages/python/dist
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      # Install the built wheel (registers the pytest11 entry point) alongside the
      # test toolchain, so the integration tests load the plugin exactly as a
      # consumer's `pip install`ed run would.
      - name: Install the wheel with the test toolchain
        run: pip install dist/*.whl pytest pytest-cov coverage
      - name: Run the plugin integration tests
        run: pytest tests/ -q
