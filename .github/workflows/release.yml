name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_packages:
        description: >-
          Manual-release override forwarded to putitoutthere, bypassing change
          detection and publishing exactly the named packages. Comma-separated
          `name[@<bump|version>]`, e.g.
          `testing-conventions-rust@0.0.2,testing-conventions-py@0.0.2,testing-conventions-npm@0.0.2`.
          Empty = normal change-detected release.
        required: false
        default: ''

jobs:
  # Preflight gate for first-publish prerequisites. Fails fast with an
  # actionable error before the reusable workflow runs, so a misconfigured
  # release does not produce confusing 404s deep in the publish step.
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Repo visibility check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          private=$(gh api "repos/${GITHUB_REPOSITORY}" --jq .private)
          if [ "$private" = "true" ]; then
            echo "::error::Repository is private. Trusted Publishing on npm / PyPI / crates.io requires a public repository so the provider can inspect the workflow file at the configured ref. Make the repo public (Settings -> General -> Danger Zone -> Change visibility) before releasing, or remove this preflight step if you have an alternative publish path."
            exit 1
          fi
          echo "Repo is public; OK to proceed."

  release:
    needs: preflight
    uses: thekevinscott/putitoutthere/.github/workflows/release.yml@v0
    permissions:
      contents: write
      id-token: write
    with:
      # Empty on push events (normal change detection); set via
      # workflow_dispatch to force a specific package/version set.
      release_packages: ${{ inputs.release_packages }}
    secrets:
      # First publish of a brand-new crate has no Trusted Publishing path
      # on crates.io (TP binds to an already-published crate). Forward a
      # long-lived API token; the reusable workflow skips the OIDC
      # exchange when this secret is set. Once 0.0.1 is on crates.io,
      # register a Trusted Publisher and unset this.
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      # Same story for npm: Trusted Publishing binds to an
      # already-published package, so the first publish needs a
      # long-lived automation token. The reusable workflow exports this
      # as NODE_AUTH_TOKEN for the npm CLI when set, and skips the OIDC
      # exchange. Without it, scoped-package PUTs return 404 (npm uses
      # 404 instead of 401 for unauthenticated writes). Drop once
      # Trusted Publishers are registered on all npm package names.
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # PyPI upload runs in the caller's workflow context. Required because
  # PyPI Trusted Publishers can't validate OIDC tokens minted from a
  # cross-repo reusable workflow (pypi/warehouse#11096). The `if:` gate
  # skips this job for non-PyPI repos.
  pypi-publish:
    needs: release
    if: needs.release.outputs.has_pypi == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      # bin/abi3 maturin wheels are Python-version-independent (py3-none),
      # but the build matrix fans across every Python version, so each
      # platform emits N byte-equivalent wheels across N artifacts. Pulling
      # them with `merge-multiple: true` points the identical filenames at
      # one path and the parallel extraction races -> torn write -> twine
      # `BadZipFile: Bad magic number`. Stage each artifact in its own dir,
      # then copy a single copy of each distribution into dist/ (first-wins;
      # the duplicates are the same wheel). Root cause is upstream: piot
      # should not fan a version-independent wheel across Python versions.
      - name: Download sdist + wheel artifacts (no merge)
        uses: actions/download-artifact@v8
        with:
          pattern: '*-sdist'
          path: staging/
      - uses: actions/download-artifact@v8
        with:
          pattern: '*-wheel-*'
          path: staging/
      - name: Collect one copy of each distribution into dist/
        run: |
          set -euo pipefail
          mkdir -p dist
          find staging -type f \( -name '*.whl' -o -name '*.tar.gz' \) | while read -r f; do
            dest="dist/$(basename "$f")"
            if [ -e "$dest" ]; then
              echo "skip duplicate: $f"
            else
              cp "$f" "$dest"
            fi
          done
          echo "dist/ contents:"; ls -l dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  # The moving major tag `@v0` is advanced by a dedicated, publish-gated workflow
  # (`.github/workflows/move-major-tag.yml`, #235), not inline here — so the tag move is a
  # named, single-responsibility step and `release.yml` stays only about publishing.
