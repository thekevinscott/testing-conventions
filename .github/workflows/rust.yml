name: Rust

on:
  pull_request:
    paths:
      - 'packages/rust/**'
      # The TypeScript mutation rule drives the bundled Node adapter (#246), exercised
      # by this crate's integration/e2e suite — re-run when the adapter changes too.
      - 'packages/node/**'
      - '.github/workflows/rust.yml'
      # The Build job guards the reusable workflow against CLI subcommand drift
      # (#92), so re-run when that workflow changes too.
      - '.github/workflows/testing-conventions.yml'

permissions:
  contents: read

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/rust
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/rust
      # Inline `#[cfg(test)]` unit tests only — the library target. The integration
      # and e2e suites under `tests/` run in the job below, so a red here points at a
      # unit test, not at an integration/e2e test. No language toolchain needed: the
      # inline tests parse in-process and never shell out to coverage.py / vitest.
      - run: cargo test --lib

  integration:
    name: Integration + e2e tests + coverage (95%)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/rust
      # The coverage rule's integration/e2e tests (#26) shell out to coverage.py;
      # the Python mutation rule's tests (#203) shell out to cosmic-ray (driving pytest).
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python -m pip install --quiet coverage pytest cosmic-ray
      # The TypeScript coverage rule's integration/e2e tests (#31) shell out to
      # vitest; install the fixtures' toolchain so `npx vitest` resolves it.
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install the TypeScript coverage fixtures' toolchain
        working-directory: packages/rust/tests/fixtures/unit_coverage/typescript
        run: npm ci
      - uses: taiki-e/install-action@cargo-llvm-cov
      # The Rust mutation rule's integration/e2e tests (#201) shell out to cargo-mutants
      # over the tiny fixture crates.
      - uses: taiki-e/install-action@cargo-mutants
      # The TypeScript mutation rule (#202) drives the bundled Node adapter (#246) rather
      # than a consumer-installed Stryker: build it (and install its deps, including
      # @stryker-mutator/*) so the rule can spawn `packages/node/dist/mutation-cli.js`. The
      # integration/e2e tests inject its path via TESTING_CONVENTIONS_TS_MUTATION_ADAPTER.
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - name: Build the TypeScript mutation adapter
        working-directory: packages/node
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build
      # The fixture projects are runner-only — they install just vitest (their own test
      # runner); Stryker comes from the adapter built above. Install so vitest resolves.
      - name: Install the TypeScript mutation fixtures' toolchain
        working-directory: packages/rust/tests/fixtures/unit_mutation/typescript
        run: npm ci
      # `cargo llvm-cov` runs the integration + e2e suites under `tests/` (and the
      # library tests) under instrumentation, enforcing the 95% line floor over the
      # whole suite — unit tests alone don't exercise the CLI dispatch in lib.rs.
      - run: cargo llvm-cov --ignore-filename-regex 'main\.rs' --fail-under-lines 95

  build:
    name: Build + smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/rust
      - run: cargo build --release
      - name: Smoke (--version)
        run: ./target/release/testing-conventions --version
      # Guard the `@v0` consumption path (#92): every `testing-conventions`
      # invocation in the reusable workflow must name a subcommand the binary still
      # exposes, so a rename like `unit location` → `unit colocated-test` (#55)
      # can't strand consumers. Uses the just-built binary (the source of truth) —
      # the published one won't carry a freshly-added subcommand yet.
      - name: Guard the reusable workflow against subcommand drift (#92)
        run: ./target/release/testing-conventions workflow ../../.github/workflows/testing-conventions.yml
