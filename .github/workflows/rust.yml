name: Rust

on:
  pull_request:
    paths:
      - 'packages/rust/**'
      - '.github/workflows/rust.yml'

permissions:
  contents: read

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/rust
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings

  unit:
    name: Unit tests + coverage (95%)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/rust
      # The coverage rule's integration/e2e tests (#26) shell out to coverage.py.
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python -m pip install --quiet coverage pytest
      # The TypeScript coverage rule's integration/e2e tests (#31) shell out to
      # vitest; install the fixtures' toolchain so `npx vitest` resolves it.
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install the TypeScript coverage fixtures' toolchain
        working-directory: packages/rust/tests/fixtures/unit_coverage/typescript
        run: npm ci
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --ignore-filename-regex 'main\.rs' --fail-under-lines 95

  build:
    name: Build + smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/rust
      - run: cargo build --release
      - name: Smoke (--version)
        run: ./target/release/testing-conventions --version
