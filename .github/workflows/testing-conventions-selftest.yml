name: Testing Conventions (self-test)

# Smoke-test the reusable workflow (`testing-conventions.yml`) end to end, so a
# regression in its *wiring* — a renamed input, a broken `npx` invocation, a
# dropped toolchain step — is caught here rather than only in a consumer repo.
# The rule *logic* is already covered by the Rust e2e tests (`coverage_e2e.rs`,
# `coverage_ts_e2e.rs`, …); this covers the workflow that drives it.
#
# It exercises the *published* `testing-conventions` (what consumers run via
# `npx`), not this branch's source — so it tracks the released surface, which is
# the contract consumers actually depend on.
#
# Each rule is self-tested as a clean/fail pair: a "clean" fixture driven through
# the reusable workflow's `uses:` call that must pass, and a violating fixture that
# must fail. A `uses:` call that fails would fail the whole run, so the fail path
# drives the published command directly and asserts on its non-zero exit.
#
# unit coverage (the rule this self-test was added for, #57):
#   clean        calls the reusable workflow against a fixture that meets its
#                floor and is clean for the colocated-test & integration-lint
#                jobs that run alongside coverage — the whole call must pass.
#   below-floor  runs the same `unit coverage` invocation the workflow's job runs
#                against a sub-floor fixture and asserts a non-zero exit.
#
# packaging (#41) — this inspects a built artifact, not the source tree, so its
# clean path exercises the upload-artifact → packaging_artifact wiring end to end:
#   packaging-clean  uploads a clean built wheel as an artifact and calls the
#                    reusable workflow with `packaging_artifact` — the packaging
#                    job downloads and inspects it; the whole call must pass.
#   packaging-red    drives the published `packaging` command on a committed wheel
#                    that ships a `*_test.py` and asserts a non-zero exit.
#
# unit lint (#125; renamed from `unit isolation` in #160) — wired for Python, TypeScript,
# and Rust. The published binary (what `npx` pulls) now ships Python isolation too, so
# `detect` routes it into the lint matrix (#146); the `clean` / `absent-language-skipped`
# jobs exercise the Python arm end to end.
#   isolation-wired  asserts the reusable workflow actually invokes `unit lint`
#                    — the red→green signal for the wiring itself.
#   isolation-python-wired  runs the workflow's real `detect` script against the clean
#                    Python fixture and asserts it routes Python into the lint matrix
#                    (`isolation_languages`) — the red→green signal for wiring Python (#146).
#   isolation-clean  calls the reusable workflow against a clean Rust crate, proving
#                    `detect` recognizes a crate and fans the lint job over it.
#   isolation-red    drives the published `unit lint` on a violating crate and
#                    asserts a non-zero exit.
#
# integration lint — the TypeScript + Rust arms and the config waiver (#126):
#   integration-lint-config-waiver   a #102 waiver in a *non-default* config path
#                                    lifts a Python integration violation; the
#                                    `uses:` call passes only because the job now
#                                    forwards `--config`.
#   integration-lint-rust            a clean Rust crate passes the reusable workflow
#                                    — the rust arm runs and rust stays out of the
#                                    coverage matrix it doesn't support.
#   integration-lint-new-arms-trip   drives the published command for the rust and
#                                    typescript arms and asserts the non-zero exit on
#                                    a violation (a `uses:` call can't assert a fail).
#
# build_command (#243) — a hook so a native-binding project can run the suite-executing jobs:
#   build-command-wired   asserts the reusable workflow runs a caller-provided `build_command`
#                         before the suite — the red→green signal for the wiring itself.
#   build-command-clean   calls the reusable workflow over a fixture whose `widget.py` imports
#                         a module produced only by the `build_command` (a maturin/napi stand-in),
#                         so the coverage / mutation jobs pass only because the build ran first.

on:
  pull_request:
    paths:
      - '.github/workflows/testing-conventions.yml'
      - '.github/workflows/testing-conventions-selftest.yml'
      - '.github/selftest/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clean:
    name: Clean suite passes the reusable workflow
    uses: ./.github/workflows/testing-conventions.yml
    with:
      languages: '["python"]'
      path: .github/selftest/clean
      config: .github/selftest/clean/testing-conventions.toml

  absent-language-skipped:
    name: A requested language with no sources is skipped, not failed
    # Point the reusable workflow at the all-Python `clean/` suite but request the
    # zero-config default ["python", "typescript"]. There are no TypeScript sources
    # here, so the TypeScript jobs must be skipped (#94) and the call passes on the
    # Python jobs alone. Before #94 the TypeScript coverage job fired and errored on
    # the empty input (a `pnpm install` with no project, an empty vitest
    # denominator), failing the whole call.
    uses: ./.github/workflows/testing-conventions.yml
    with:
      languages: '["python", "typescript"]'
      path: .github/selftest/clean
      config: .github/selftest/clean/testing-conventions.toml

  no-source-library-passes:
    name: A library with no sources for the requested languages passes (jobs skipped)
    # The dogfooding case (#94): our own packages/python ships a wheel but carries
    # zero .py, so its coverage job has nothing to measure and errors today. A
    # library with no sources for any requested language must pass with every
    # language's jobs skipped — never failed. Mirrored here with a source-free
    # fixture and the zero-config default.
    uses: ./.github/workflows/testing-conventions.yml
    with:
      languages: '["python", "typescript"]'
      path: .github/selftest/no-sources

  integration-lint-config-waiver:
    name: Integration lint forwards the consumer's --config (#102 waiver honored)
    # The integration-lint job must pass the caller's `config` through to
    # `integration lint`, so a #102 waiver lifts the violation it names. This fixture
    # is a clean Python suite (its colocated-test and coverage jobs pass) whose one
    # integration test trips `no-constant-patch`, lifted by a `[[python.exempt]]`
    # entry in a *non-default* config path. The whole `uses:` call passes only when
    # the job forwards `--config` (#126): before it did, the job dropped the flag, so
    # the waiver was ignored, the violation was reported, and the call failed.
    uses: ./.github/workflows/testing-conventions.yml
    with:
      languages: '["python"]'
      path: .github/selftest/integration-waiver
      config: .github/selftest/integration-waiver/testing-conventions.toml

  integration-lint-rust:
    name: A clean Rust library passes the reusable workflow (rust arm runs)
    # A clean Rust crate must pass the reusable workflow: the rust arm runs
    # `integration lint` and `unit lint`, and — since Rust coverage went zero-config
    # (`lines = 100`, #206) — the crate now also enters the coverage matrix, so the
    # fixture's integration test runs first-party for real (no double) and is fully
    # line-covered, clearing the coverage arm too. (Rust still stays off the
    # colocated-test matrix, which fans over the python/typescript `languages` set.)
    uses: ./.github/workflows/testing-conventions.yml
    with:
      languages: '["rust"]'
      path: .github/selftest/integration-rust/clean

  integration-lint-new-arms-trip:
    name: The TypeScript and Rust integration-lint arms fail on a violation
    # The fail path for the new arms (#126): a `uses:` call that fails would fail the
    # whole run, so drive the published command directly — the exact invocation the
    # workflow's rust/typescript arms run — and assert the non-zero exit that fails a
    # consumer's build, with a clean pass alongside each.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Rust — a first-party `#[double]` must fail integration lint
        run: |
          if npx -y testing-conventions integration lint --language rust \
            .github/selftest/integration-rust/red; then
            echo "::error::expected the red Rust crate to fail integration lint, but it passed"
            exit 1
          fi
          echo "red Rust crate correctly tripped integration lint"
      - name: TypeScript — a first-party `vi.mock` must fail integration lint
        run: |
          if npx -y testing-conventions integration lint --language typescript \
            .github/selftest/integration-typescript/red; then
            echo "::error::expected the red TypeScript suite to fail integration lint, but it passed"
            exit 1
          fi
          echo "red TypeScript suite correctly tripped integration lint"
      - name: TypeScript — a clean integration suite passes
        run: npx -y testing-conventions integration lint --language typescript .github/selftest/integration-typescript/clean

  below-floor:
    name: Below-floor suite trips the coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install coverage toolchain (coverage.py + pytest)
        run: python -m pip install --quiet coverage pytest
      - name: A sub-floor suite must fail `unit coverage`
        # The same invocation the reusable workflow's unit-coverage job runs. The
        # non-zero exit is what fails a consumer's build, so assert it here: this
        # job stays green precisely when the gate correctly trips.
        run: |
          if npx -y testing-conventions unit coverage \
            --language python \
            --config .github/selftest/below-floor/testing-conventions.toml \
            .github/selftest/below-floor; then
            echo "::error::expected the below-floor suite to fail the coverage gate, but it passed"
            exit 1
          fi
          echo "below-floor suite correctly tripped the coverage gate"

  mutation-gate:
    name: An un-exempted survivor trips the mutation gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      # This runs the *published* CLI, which gains self-provisioning (#242) only once that
      # ships — so install the engine until then, and cache the tool's provisioning dir the
      # published binary will populate post-release.
      - name: Cache the provisioned cargo-mutants
        uses: actions/cache@v4
        with:
          path: ~/.cache/testing-conventions
          key: cargo-mutants-provision-${{ runner.os }}
      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: A clean crate passes `unit mutation`
        # Every mutant is caught, so the gate clears — the green half of the signal.
        run: npx -y testing-conventions unit mutation --language rust .github/selftest/mutation/clean
      - name: A crate with an un-exempted survivor must fail `unit mutation`
        # The same invocation the reusable workflow's mutation job runs. The non-zero
        # exit is what fails a consumer's build, so assert it here: this job stays green
        # precisely when the gate correctly trips on a surviving mutant.
        run: |
          if npx -y testing-conventions unit mutation --language rust .github/selftest/mutation/survivor; then
            echo "::error::expected the survivor crate to fail the mutation gate, but it passed"
            exit 1
          fi
          echo "survivor crate correctly tripped the mutation gate"

  mutation-wired:
    name: The reusable workflow enforces unit mutation
    # The red→green signal for #204: the reusable workflow must actually invoke
    # `unit mutation`, or the shipped rule isn't enforced on the @v0 path. A static grep
    # of the workflow file, so it passes regardless of what the published binary ships.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: testing-conventions.yml must invoke `unit mutation`
        run: |
          set -euo pipefail
          if ! grep -q 'unit mutation --language' .github/workflows/testing-conventions.yml; then
            echo "::error::the reusable workflow does not invoke \`unit mutation\` — the shipped mutation rule is not enforced on the @v0 path (#204)"
            exit 1
          fi
          echo "reusable workflow invokes \`unit mutation\`"

  isolation-wired:
    name: The reusable workflow enforces unit lint
    # The red→green signal for #125: the reusable workflow must actually invoke
    # `unit lint`, or the shipped rule isn't enforced on the @v0 path. A static grep of
    # the workflow file, so it passes regardless of what the published binary ships.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: testing-conventions.yml must invoke `unit lint`
        run: |
          set -euo pipefail
          if ! grep -q 'unit lint --language' .github/workflows/testing-conventions.yml; then
            echo "::error::the reusable workflow does not invoke \`unit lint\` — the shipped lint rule is not enforced on the @v0 path (#125)"
            exit 1
          fi
          echo "reusable workflow invokes \`unit lint\`"

  rolling-release-wired:
    name: The major tag advances only via the gated move-major-tag workflow
    # The red→green signal for #235. `@v0` is a moving tag, but the reusable workflow runs
    # the *published* npm binary while its own file is frozen at the tag — so the tag must
    # advance only AFTER that binary publishes, or a consumer gets new-workflow + old-binary
    # (the #55 `unrecognized subcommand` stranding). Assert the invariant statically: a
    # dedicated `move-major-tag.yml` that is publish-gated (`workflow_run` on Release) and
    # concurrency-guarded owns the move, and `release.yml` no longer moves the tag inline.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: move-major-tag.yml is present, publish-gated, and concurrency-guarded
        run: |
          set -euo pipefail
          wf=.github/workflows/move-major-tag.yml
          if [ ! -f "$wf" ]; then
            echo "::error::missing $wf — the major tag has no dedicated advance workflow (#235)"
            exit 1
          fi
          if ! grep -q 'workflow_run:' "$wf"; then
            echo "::error::$wf is not gated on a workflow_run (Release completion) — @v0 could advance before the binary publishes (#235)"
            exit 1
          fi
          if ! grep -q 'concurrency:' "$wf"; then
            echo "::error::$wf has no concurrency group — out-of-order tag moves are unguarded (#235)"
            exit 1
          fi
          echo "move-major-tag.yml is present, publish-gated, and concurrency-guarded"
      - name: release.yml does not move the major tag inline
        run: |
          set -euo pipefail
          # The tag move lives in the gated move-major-tag.yml, never inline in the publish
          # pipeline — `git tag -f v0` in release.yml would re-couple it and drop the gate.
          if grep -q 'tag -f v0' .github/workflows/release.yml; then
            echo "::error::release.yml moves @v0 inline (\`git tag -f v0\`) — the move belongs in the gated move-major-tag.yml, not the publish workflow (#235)"
            exit 1
          fi
          echo "release.yml no longer moves @v0 inline"

  detect-routes-python:
    name: the detect action routes Python into the unit-lint matrix
    # Detection now lives in the repo-only detect action, tested by pytest (#189). This
    # confirms it routes Python into `isolation_languages` end to end, the way the
    # reusable workflow's detect job consumes it — driven with the `clean` job's inputs.
    # (Replaces the old job that extracted the inline `detect` bash, which is gone.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - id: detect
        uses: ./.github/actions/detect
        with:
          languages: '["python"]'
          path: .github/selftest/clean
      - name: Assert Python is in isolation_languages
        env:
          ISO: ${{ steps.detect.outputs.isolation_languages }}
        run: |
          set -euo pipefail
          echo "isolation_languages=$ISO"
          case "$ISO" in
            *'"python"'*) echo "Python routed into the unit-lint matrix" ;;
            *) echo "::error::the detect action did not route Python into isolation_languages (got: $ISO)"; exit 1 ;;
          esac

  isolation-clean:
    name: A clean crate passes the unit-lint job
    # Exercises the Rust path end to end: ["rust"] over a clean crate, so `detect`
    # recognizes the crate and fans the lint job over `rust` (#125); the source-matrix
    # jobs skip on this rust-only fixture.
    uses: ./.github/workflows/testing-conventions.yml
    with:
      languages: '["rust"]'
      path: .github/selftest/isolation/rust-clean

  isolation-red:
    name: A crate with an un-isolated unit trips the lint check
    # The fail path: a `uses:` call that fails would fail the whole run, so drive the
    # published `unit lint` command directly on a crate whose unit test reaches out of
    # its module (effectful `std::fs`) and assert the non-zero exit that fails a
    # consumer's build.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: A crate with an out-of-module unit-test call must fail `unit lint`
        run: |
          if npx -y testing-conventions unit lint \
            --language rust \
            .github/selftest/isolation/rust-red; then
            echo "::error::expected the un-isolated crate to fail the lint check, but it passed"
            exit 1
          fi
          echo "un-isolated crate correctly tripped the lint check"

  upload-clean-dist:
    name: Upload the clean built wheel as an artifact
    # The packaging job consumes a build artifact, so stage one the way a consumer
    # would: upload the committed clean wheel under a known name for packaging-clean
    # to pass through `packaging_artifact`.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/upload-artifact@v7
        with:
          name: selftest-clean-dist
          path: .github/selftest/packaging/clean/

  packaging-clean:
    name: A clean built artifact passes the packaging check
    # The reusable workflow's `uses:` clean path for packaging: download the
    # uploaded wheel and inspect it. `path` points at the source-free fixture so the
    # source-matrix jobs all skip (#94) and only the packaging job runs — the whole
    # call must pass.
    needs: upload-clean-dist
    uses: ./.github/workflows/testing-conventions.yml
    with:
      languages: '["python"]'
      path: .github/selftest/no-sources
      packaging_artifact: selftest-clean-dist

  packaging-red:
    name: A built artifact shipping a test file trips the packaging check
    # The fail path: a `uses:` call that fails would fail the whole run, so drive the
    # published `packaging` command directly on a committed wheel that ships
    # widget/core_test.py and assert the non-zero exit that fails a consumer's build.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: A wheel that ships a `*_test.py` must fail `packaging`
        run: |
          if npx -y testing-conventions packaging \
            .github/selftest/packaging/red/widget-0.1.0-py3-none-any.whl \
            --language python; then
            echo "::error::expected the red wheel to fail the packaging check, but it passed"
            exit 1
          fi
          echo "red wheel correctly tripped the packaging check"

  # ---- Epic #170: realign the workflow with the CLI surface (one rule = one job) ----

  coverage-rust-wired:
    name: The reusable workflow fans unit coverage over Rust
    # Red→green wiring signal for #171: the unit-coverage job's matrix must include
    # rust (via `detect`'s `coverage_languages` set), or the shipped Rust coverage
    # arm (#37, cargo-llvm-cov regions/lines floor) isn't enforced on the @v0 path.
    # A static grep, so it tracks the workflow file regardless of what the published
    # binary ships.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: testing-conventions.yml must fan unit-coverage over rust
        run: |
          set -euo pipefail
          if ! grep -q 'coverage_languages' .github/workflows/testing-conventions.yml; then
            echo "::error::the reusable workflow's unit-coverage job does not fan out over rust (no \`coverage_languages\` matrix) — the shipped Rust coverage arm (#37) is not enforced on the @v0 path (#171)"
            exit 1
          fi
          echo "reusable workflow fans unit-coverage over rust"

  coverage-rust-clean:
    name: A clean Rust crate passes the reusable workflow's coverage arm
    # The clean path for #171: a fully-covered crate driven through the reusable
    # workflow under ["rust"]. `detect` recognizes the crate and fans the
    # unit-coverage job over rust, which clears the 100 floor — alongside the
    # unit-lint and integration-lint rust jobs, which the well-isolated,
    # `tests/`-free crate also passes. Source-matrix python/typescript jobs skip.
    uses: ./.github/workflows/testing-conventions.yml
    with:
      languages: '["rust"]'
      path: .github/selftest/coverage-rust/clean
      config: .github/selftest/coverage-rust/clean/testing-conventions.toml

  coverage-rust-red:
    name: A below-floor Rust crate trips the coverage arm
    # The fail path for #171: a `uses:` call that fails would fail the whole run, so
    # drive the published `unit coverage --language rust` directly — the exact
    # invocation the workflow's rust coverage arm runs — on a sub-floor crate and
    # assert the non-zero exit that fails a consumer's build.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: A sub-floor crate must fail `unit coverage --language rust`
        run: |
          if npx -y testing-conventions unit coverage \
            --language rust \
            --config .github/selftest/coverage-rust/below/testing-conventions.toml \
            .github/selftest/coverage-rust/below; then
            echo "::error::expected the below-floor crate to fail the rust coverage gate, but it passed"
            exit 1
          fi
          echo "below-floor crate correctly tripped the rust coverage gate"

  diff-scoped-wired:
    name: The reusable workflow runs the diff-scoped --base checks
    # Red→green wiring signal for #172: the workflow must invoke the commit-scoped
    # co-change (`unit colocated-test --base`, #161) and changed-line coverage
    # (`unit coverage --base`, #162) checks, or neither diff-scoped rule runs in CI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: testing-conventions.yml must run the --base checks
        run: |
          set -euo pipefail
          missing=0
          grep -qE 'colocated-test .*--base' .github/workflows/testing-conventions.yml || missing=1
          grep -qE 'unit coverage .*--base' .github/workflows/testing-conventions.yml || missing=1
          if [ "$missing" -ne 0 ]; then
            echo "::error::the reusable workflow does not run the diff-scoped \`--base\` checks (co-change #161 / changed-line coverage #162) — they never run in CI (#172)"
            exit 1
          fi
          echo "reusable workflow runs the diff-scoped --base checks"

  e2e-verify-wired:
    name: The reusable workflow offers an opt-in e2e verify job
    # Red→green wiring signal for #173: the workflow must offer the e2e freshness
    # gate (#68) behind an opt-in `run_e2e` input, or consumers can't enforce it on
    # the @v0 path. A static grep for the input and the command; the rule's runtime
    # behavior is covered by the Rust e2e test (`e2e_verify_e2e.rs`).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: testing-conventions.yml must wire opt-in `e2e verify`
        run: |
          set -euo pipefail
          missing=0
          grep -q 'run_e2e' .github/workflows/testing-conventions.yml || missing=1
          grep -qE 'e2e verify' .github/workflows/testing-conventions.yml || missing=1
          if [ "$missing" -ne 0 ]; then
            echo "::error::the reusable workflow does not offer an opt-in \`e2e verify\` job (input \`run_e2e\` + \`e2e verify\`) — the #68 freshness gate isn't on the @v0 path (#173)"
            exit 1
          fi
          echo "reusable workflow offers opt-in e2e verify"

  diff-scoped-runs:
    name: A clean PR passes the diff-scoped --base jobs
    # The runtime half of #172: call the reusable workflow with the new `base` input
    # over a fixture added in this PR, so `<base>...HEAD` carries real changed lines.
    # On a PR the `*-changed` jobs run — co-change excuses the added file but
    # requires its colocated test to exist, and the added lines clear the coverage
    # floor — so the whole call passes.
    uses: ./.github/workflows/testing-conventions.yml
    with:
      languages: '["python"]'
      path: .github/selftest/diff-clean
      config: .github/selftest/diff-clean/testing-conventions.toml
      base: origin/main

  # ---- Wire the reusable workflow to the tested detect action (#185/#186 go live) ----
  # The detection logic is tested in .github/actions/detect (pytest, #189); these assert
  # the @v0 workflow is actually wired to that engine and gates the default-on jobs on its
  # outputs — the same static-wiring style as coverage-rust-wired / e2e-verify-wired above.

  wiring-detect-action:
    name: The reusable workflow detects via the detect action (#185)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: testing-conventions.yml must use the detect action
        run: |
          set -euo pipefail
          if ! grep -qE 'uses:[[:space:]]*[^[:space:]]*actions/detect@' .github/workflows/testing-conventions.yml; then
            echo "::error::the reusable workflow doesn't use the detect action — detection still runs as inline bash, off the tested engine (#185)"
            exit 1
          fi
          echo "reusable workflow detects via the detect action"

  wiring-packaging-default-on:
    name: The reusable workflow runs packaging by default (#186)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: packaging must gate on detect's packaging_dist output
        run: |
          set -euo pipefail
          if ! grep -q 'packaging_dist' .github/workflows/testing-conventions.yml; then
            echo "::error::the packaging job doesn't gate on detect's \`packaging_dist\` — packaging isn't default-on (#186)"
            exit 1
          fi
          echo "packaging is default-on (gates on packaging_dist)"

  wiring-e2e-default-on:
    name: The reusable workflow runs e2e verify by default (#186)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: e2e-verify must gate on detect's e2e_attestation output
        run: |
          set -euo pipefail
          if ! grep -q 'e2e_attestation' .github/workflows/testing-conventions.yml; then
            echo "::error::the e2e-verify job doesn't gate on detect's \`e2e_attestation\` — e2e verify isn't default-on (#186)"
            exit 1
          fi
          echo "e2e verify is default-on (gates on e2e_attestation)"

  # ---- #243: a build_command hook so native-binding projects can run the suite jobs ----

  build-command-wired:
    name: The reusable workflow runs a build_command before the suite
    # Red→green wiring signal for #243: the reusable workflow must run a caller-provided
    # `build_command` step before the suite-executing jobs (unit coverage / changed-line
    # coverage / mutation) invoke the suite — otherwise a native-binding consumer's
    # compiled module is never built and the suite fails at import. A static grep, so it
    # tracks the workflow file regardless of what the published binary ships; the runtime
    # behavior is covered by `build-command-clean`.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: testing-conventions.yml must wire a build_command step
        run: |
          set -euo pipefail
          if ! grep -q 'inputs.build_command' .github/workflows/testing-conventions.yml; then
            echo "::error::the reusable workflow has no \`build_command\` step — a native-binding consumer's compiled module is never built before the suite runs (#243)"
            exit 1
          fi
          echo "reusable workflow wires a build_command step"

  build-command-clean:
    name: A build_command makes the suite-executing jobs find a built module
    # The runtime half of #243: the `build-command` fixture's `widget.py` imports
    # `generated`, a module absent from the source tree — it stands in for a maturin/napi
    # native module and is produced only by the `build_command`. So the coverage,
    # changed-line coverage, and mutation jobs pass iff the workflow runs `build_command`
    # before the suite (without it, pytest fails at import). The static colocated-test /
    # lint jobs run without the build and never see the generated module, so they pass
    # as-is. `base: origin/main` exercises the diff-scoped jobs over this PR-added fixture
    # (its tests pin exact values, so every changed-line mutant is killed). The whole
    # `uses:` call passes only because the build step is wired into the suite jobs (#243).
    uses: ./.github/workflows/testing-conventions.yml
    with:
      languages: '["python"]'
      path: .github/selftest/build-command
      config: .github/selftest/build-command/testing-conventions.toml
      build_command: cp .github/selftest/build-command/generated.py.tmpl .github/selftest/build-command/generated.py
      base: origin/main
