name: Testing Conventions

# Reusable, consumer-facing workflow: enforce a library's testing conventions in
# CI. Drop a single short file into your repo and opt into the full rule set with
# our defaults — no config required.
#
#   # .github/workflows/conventions.yml
#   name: Conventions
#   on: [pull_request]
#   jobs:
#     conventions:
#       uses: thekevinscott/testing-conventions/.github/workflows/testing-conventions.yml@v0
#
# The principle is **one consumer-facing rule command → one job**, fanned out per
# language. It runs the published `testing-conventions` binary via `npx` (a
# prebuilt, per-platform npm package — no Rust toolchain, no compile from source),
# failing the build on any violation. The shipped rule jobs are:
#
#   - unit colocated-test  — every source file has a colocated unit test (all langs)
#   - unit lint            — the unit-suite isolation lint (Python, TypeScript, Rust)
#   - unit coverage        — the unit coverage floor (Python, TypeScript, and Rust
#                            via cargo-llvm-cov, #37)
#   - integration lint     — the integration mocking lints (Python, TypeScript, Rust)
#   - packaging            — no test files in the built distribution
#
# Two diff-scoped variants run as their own `*-changed` jobs on `pull_request`
# only (they need `fetch-depth: 0` and a base ref): `unit colocated-test --base`
# (co-change, #161) and `unit coverage --base` (changed-line coverage, #162). And
# an opt-in `e2e verify` job (#68) checks the committed e2e attestation; it's off
# by default (`run_e2e`).
#
# A `detect` pre-step scans `path` for each requested language's sources, and the
# rule jobs fan out over the languages that are both requested *and* present
# (#94). A requested language the library has no sources for — e.g. the
# zero-config default ["python", "typescript"] against a repo with no `.py` — is
# dropped from the matrix and skipped, not failed: its coverage job would
# otherwise error on an empty measurement (pytest collects nothing; an empty
# vitest denominator is a failed run). `detect` additionally recognizes a crate
# (`Cargo.toml` / `*.rs`) and emits separate `integration_lint_languages`,
# `isolation_languages`, and `coverage_languages` sets that add Rust for the jobs
# that support it.
#
# The Packaging rule (#41) is the exception: it inspects the *built distribution*,
# not the source tree, so it doesn't ride the source matrix. Build your dists in
# your own job, upload them with actions/upload-artifact, and pass that artifact's
# name as `packaging_artifact` — the packaging job downloads it and fails if any
# .whl/.tar.gz (python), .tgz (typescript), or .crate (rust) ships a test file:
#
#   jobs:
#     build:
#       runs-on: ubuntu-latest
#       steps:
#         - run: python -m build            # → dist/*.whl, dist/*.tar.gz
#         - uses: actions/upload-artifact@v4
#           with: { name: dist, path: dist/ }
#     conventions:
#       needs: build
#       uses: thekevinscott/testing-conventions/.github/workflows/testing-conventions.yml@v0
#       with:
#         packaging_artifact: dist
#
# No config file is required: every check runs with sane defaults, opting a new
# library into the full set in one drop-in (#80). The coverage floor falls back
# to the language's reasonable default — Python: branch on, 85; TypeScript:
# lines/functions/statements 80, branches 75 — when no `testing-conventions.toml`
# is present (Rust has no default floor yet, so a Rust crate must declare a
# `[rust].coverage` table). Add a config file only to tighten a floor or declare
# exemptions.
#
# `languages` is a JSON array so the matrix can fan out over it directly
# (reusable-workflow inputs can't be native lists). Once the config-driven
# `check` umbrella is wired this will read the config file itself.

on:
  workflow_call:
    inputs:
      languages:
        description: 'JSON array of languages to check, e.g. ["python", "typescript"].'
        type: string
        default: '["python", "typescript"]'
      path:
        description: 'Directory scanned recursively for sources.'
        type: string
        default: 'src'
      version:
        description: 'testing-conventions version to run, e.g. 0.1.0 (default: latest from npm).'
        type: string
        default: ''
      config:
        description: 'Optional config file to refine the checks (coverage thresholds, exemptions). If absent, every check runs with sane defaults.'
        type: string
        default: 'testing-conventions.toml'
      base:
        description: 'Base ref for the diff-scoped `--base` jobs, diffed as `<base>...HEAD`. Used by the `*-changed` jobs, which run on `pull_request` only and check out full history.'
        type: string
        default: 'origin/main'
      run_e2e:
        description: 'Opt in to the `e2e verify` job (the #68 freshness gate): fail if the committed `e2e-attestation.json` does not name the latest code commit. Off by default — it needs a committed attestation and full git history.'
        type: boolean
        default: false
      packaging_artifact:
        description: 'Name of an uploaded build artifact (actions/upload-artifact) holding the built distributions (.whl/.tar.gz/.tgz/.crate) to check. When set, a packaging job downloads it and fails if any distribution ships a test file. Empty (default) skips the packaging check.'
        type: string
        default: ''

permissions:
  contents: read

jobs:
  detect:
    name: Detect requested languages with sources
    runs-on: ubuntu-latest
    outputs:
      # JSON array of the requested python/typescript languages with sources under
      # `path` — the matrix the colocated-test job (and the co-change `*-changed`
      # job) fans out over.
      languages: ${{ steps.scan.outputs.languages }}
      # The same set plus rust — the matrix the integration-lint job fans out over
      # (#126).
      integration_lint_languages: ${{ steps.scan.outputs.integration_lint_languages }}
      # `unit lint` (#125): python/typescript + rust, also kept off the coverage matrix.
      isolation_languages: ${{ steps.scan.outputs.isolation_languages }}
      # `unit coverage` (#37/#171): present python/typescript plus rust when a crate
      # is present — the matrix the whole-tree and changed-line coverage jobs fan
      # out over. Kept as its own set so a future coverage-less language can diverge.
      coverage_languages: ${{ steps.scan.outputs.coverage_languages }}
    steps:
      - uses: actions/checkout@v6
      - id: scan
        name: Scan ${{ inputs.path }} for each requested language's sources
        env:
          LANGUAGES: ${{ inputs.languages }}
          SCAN_PATH: ${{ inputs.path }}
        run: |
          set -euo pipefail
          # The "cheap pre-step" (#94): a language's jobs should fire only when it
          # was requested *and* `path` actually holds sources for it. colocated-test
          # and integration-lint pass vacuously on an absent language, but `unit
          # coverage` has nothing to measure and errors (pytest collects nothing; an
          # empty vitest denominator is a failed run) — so a requested-but-absent
          # language is dropped here and skipped, not failed.
          #
          # Four sets come out: `languages` (python/typescript) drives colocated-test
          # and its co-change `*-changed` job; `coverage_languages` (#171) adds rust
          # for the coverage jobs; `integration_lint_languages` (#126) and
          # `isolation_languages` (#125) add rust for those static checks.
          #
          # `set -f` so the shell leaves the *.ext globs for `find` to match itself.
          set -f
          # Requested? — the language name appears in the JSON `languages` input.
          requested () {
            case "$LANGUAGES" in *"\"$1\""*) return 0 ;; *) return 1 ;; esac
          }
          # Present? — a file matching the given `find` name-predicates exists.
          present_under () {
            [ -n "$(find "$SCAN_PATH" -type f \( "$@" \) -print -quit 2>/dev/null)" ]
          }
          present=()
          scan () {  # $1 = language; $2.. = the find name-predicates for its sources
            local lang="$1"; shift
            if requested "$lang" && present_under "$@"; then
              present+=("$lang")
            fi
          }
          # colocated-test fans out over python/typescript.
          scan python -name '*.py'
          scan typescript -name '*.ts' -o -name '*.tsx' -o -name '*.mts' -o -name '*.cts'
          # Rust is detected once (a Cargo.toml or any *.rs marks a crate) and added
          # to every set that supports it: integration-lint (#126), unit-lint (#125),
          # and now unit-coverage (#37/#171).
          rust_crate=0
          if requested rust && present_under -name 'Cargo.toml' -o -name '*.rs'; then
            rust_crate=1
          fi
          # The integration-lint matrix is `present` plus rust (#126).
          lint=("${present[@]}")
          if [ "$rust_crate" -eq 1 ]; then lint+=("rust"); fi
          # `unit coverage` (#171): present python/typescript plus rust.
          coverage=("${present[@]}")
          if [ "$rust_crate" -eq 1 ]; then coverage+=("rust"); fi
          # `unit lint` runs for every present source language the published binary
          # ships — Python (#42), TypeScript (#43/#76/#77) — plus rust (a crate, #44).
          # Its set is `present` (python/typescript) plus rust when a crate is present,
          # the same shape as the integration-lint set, so rust never enters the coverage
          # matrix. Python isolation shipped to npm, so it's wired here now (#146).
          isolation=("${present[@]}")
          if [ "$rust_crate" -eq 1 ]; then isolation+=("rust"); fi
          # Emit each as a compact JSON array (`[]` when nothing matched).
          to_json () {
            local json='[' first=1 x
            for x in "$@"; do
              [ "$first" -eq 1 ] && first=0 || json+=','
              json+="\"$x\""
            done
            printf '%s]' "$json"
          }
          languages_json="$(to_json "${present[@]}")"
          lint_json="$(to_json "${lint[@]}")"
          coverage_json="$(to_json "${coverage[@]}")"
          isolation_json="$(to_json "${isolation[@]}")"
          {
            echo "languages=$languages_json"
            echo "integration_lint_languages=$lint_json"
            echo "coverage_languages=$coverage_json"
            echo "isolation_languages=$isolation_json"
          } >> "$GITHUB_OUTPUT"
          echo "requested $LANGUAGES under '$SCAN_PATH' → colocated $languages_json, coverage $coverage_json, integration-lint $lint_json, isolation $isolation_json"

  colocated-test:
    name: Colocated test (${{ matrix.language }})
    needs: detect
    # Only the requested languages with sources present (#94); skip the job
    # entirely when that leaves nothing.
    if: needs.detect.outputs.languages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.languages) }}
    steps:
      - uses: actions/checkout@v6
      - name: Check colocated test
        # node/npx ship on ubuntu-latest; `-y` skips the install prompt and
        # `${VERSION:+@...}` pins the version only when one was requested.
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" unit colocated-test --language "$LANGUAGE" "$SCAN_PATH"

  colocated-test-changed:
    name: Colocated test — co-change (${{ matrix.language }})
    needs: detect
    # Diff-scoped co-change (#161): on a PR, a modified or deleted source whose
    # colocated test didn't co-change fails. Rust is excluded by the rule (inline
    # `#[cfg(test)]` units can't go stale), so this rides the python/typescript
    # `languages` set. PR-only — it needs a base ref and full history.
    if: ${{ github.event_name == 'pull_request' && needs.detect.outputs.languages != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.languages) }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Co-change diffs `<base>...HEAD`, so the base ref must be reachable.
          fetch-depth: 0
      - name: Check co-change vs ${{ inputs.base }}
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          CONFIG: ${{ inputs.config }}
          BASE: ${{ inputs.base }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" unit colocated-test --language "$LANGUAGE" --base "$BASE" --config "$CONFIG" "$SCAN_PATH"

  unit-lint:
    name: Unit lint (${{ matrix.language }})
    needs: detect
    # `unit lint` is a static AST check (no language toolchain), like
    # colocated-test — a cheap matrix job, not a toolchain-heavy one like coverage.
    # It enforces the rule for Python (#42), TypeScript (#43/#76/#77), and Rust (#44).
    # The matrix is `isolation_languages` — the requested-and-present set, which
    # (unlike `languages`) includes rust — so a requested-but-absent language is
    # skipped, not failed. #56 (config-driven `check`) will later drive which
    # rules/languages run here.
    if: needs.detect.outputs.isolation_languages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.isolation_languages) }}
    steps:
      - uses: actions/checkout@v6
      - name: Check unit lint
        # Static check — just the binary via npx, no toolchain. `--config` applies
        # the #102 `[[<language>.exempt]]` waivers, like the other unit jobs.
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          CONFIG: ${{ inputs.config }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" unit lint --language "$LANGUAGE" --config "$CONFIG" "$SCAN_PATH"

  unit-coverage:
    name: Unit-test coverage (${{ matrix.language }})
    needs: detect
    # `unit coverage` enforces the Python (#26), TypeScript (#31), and Rust (#37)
    # floors. The matrix is `coverage_languages` — the requested languages with
    # sources present (#94), plus rust when a crate is here (#171) — so a
    # requested-but-absent language is skipped rather than erroring on an empty
    # measurement. #56 (config-driven `check`) will eventually drive this from the
    # config file.
    if: needs.detect.outputs.coverage_languages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.coverage_languages) }}
    steps:
      - uses: actions/checkout@v6
      # Unlike the static colocated-test / lint checks, `unit coverage` shells out
      # to the language's coverage tool — so its toolchain, and the project's own
      # test deps, must be present. Set up per language.
      - if: matrix.language == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - if: matrix.language == 'python'
        name: Install coverage toolchain (coverage.py + pytest)
        run: python -m pip install --quiet coverage pytest
      # TypeScript shells out to vitest, so install the project's deps (including
      # vitest + @vitest/coverage-v8) with pnpm, the TS convention. A project on a
      # different package manager should drive the CLI directly until #56 makes
      # this config-driven.
      - if: matrix.language == 'typescript'
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - if: matrix.language == 'typescript'
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - if: matrix.language == 'typescript'
        name: Install project dependencies (pnpm)
        run: pnpm install --frozen-lockfile
      # Rust shells out to cargo-llvm-cov (#37/#171): a stable toolchain with the
      # llvm-tools component, plus cargo-llvm-cov itself.
      - if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - if: matrix.language == 'rust'
        name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Check unit-test coverage
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          CONFIG: ${{ inputs.config }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" unit coverage --language "$LANGUAGE" --config "$CONFIG" "$SCAN_PATH"

  coverage-changed:
    name: Unit-test coverage — changed lines (${{ matrix.language }})
    needs: detect
    # Diff-scoped changed-line coverage (#162): on a PR, the configured floor is
    # measured over only the `<base>...HEAD` changed lines, so a changed line below
    # the floor fails no matter how small the diff. Mirrors the whole-tree
    # unit-coverage job's per-language toolchain setup; PR-only (needs the base ref).
    if: ${{ github.event_name == 'pull_request' && needs.detect.outputs.coverage_languages != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.coverage_languages) }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Changed-line coverage diffs `<base>...HEAD`, so the base ref must be
          # reachable.
          fetch-depth: 0
      - if: matrix.language == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - if: matrix.language == 'python'
        name: Install coverage toolchain (coverage.py + pytest)
        run: python -m pip install --quiet coverage pytest
      - if: matrix.language == 'typescript'
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - if: matrix.language == 'typescript'
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - if: matrix.language == 'typescript'
        name: Install project dependencies (pnpm)
        run: pnpm install --frozen-lockfile
      - if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - if: matrix.language == 'rust'
        name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Check changed-line coverage vs ${{ inputs.base }}
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          CONFIG: ${{ inputs.config }}
          BASE: ${{ inputs.base }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" unit coverage --language "$LANGUAGE" --base "$BASE" --config "$CONFIG" "$SCAN_PATH"

  integration-lint:
    name: Integration lint (${{ matrix.language }})
    needs: detect
    # `integration lint` (mocking mechanism & style) ships for Python (#58),
    # TypeScript (#43/#75), and Rust (#44), so the matrix fans out over every
    # requested language with sources present — the `integration_lint_languages` set,
    # which adds rust on top of the colocated languages (#126). Skipped — not
    # failed — when that set is empty. #56 (config-driven `check`) will eventually
    # drive which rules/languages run here.
    if: needs.detect.outputs.integration_lint_languages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.integration_lint_languages) }}
    steps:
      - uses: actions/checkout@v6
      - name: Lint integration tests
        # `--config` so a consumer's #102 waivers are honored, matching the
        # unit-coverage job (an absent file waives nothing).
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          CONFIG: ${{ inputs.config }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" integration lint --language "$LANGUAGE" --config "$CONFIG" "$SCAN_PATH"

  e2e-verify:
    name: E2E attestation freshness (e2e verify)
    # Opt-in #68 gate: verify the committed `e2e-attestation.json` names the latest
    # code commit, failing (with a re-attest nudge) when the code has moved on. Off
    # by default — it needs a committed attestation and full history, so it can't be
    # default-on. Never runs the e2e suite itself.
    if: ${{ inputs.run_e2e }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # `e2e verify` finds the latest code commit via `git log`, so it needs
          # full history — a shallow clone would miss it.
          fetch-depth: 0
      - name: Verify the e2e attestation is current
        env:
          VERSION: ${{ inputs.version }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" e2e verify

  packaging:
    name: Packaging (no test files in the built artifact)
    # Unlike the checks above, packaging inspects the *built distribution*, not the
    # source tree — so it doesn't fan out over `detect`'s source matrix. The
    # consumer's own build job uploads its built dists (actions/upload-artifact) and
    # passes that artifact's name as `packaging_artifact`; this job downloads it and
    # checks each file, inferring the language from the extension. Skipped — never
    # failed — when no `packaging_artifact` is given.
    if: inputs.packaging_artifact != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download the built distributions
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.packaging_artifact }}
          path: _packaging_artifact
      - name: Check the built distributions ship no test files
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          # nullglob: an unmatched glob expands to nothing (not the literal);
          # globstar: `**` recurses, so a nested dist is found too.
          shopt -s nullglob globstar
          # Language is inferred from the distribution's extension: a wheel/sdist is
          # python, an `npm pack` tarball is typescript, a Cargo crate is rust.
          checked=0
          check () {
            local lang="$1"; shift
            for dist in "$@"; do
              echo "::group::packaging --language $lang $dist"
              npx -y "testing-conventions${VERSION:+@$VERSION}" packaging "$dist" --language "$lang"
              echo "::endgroup::"
              checked=$((checked + 1))
            done
          }
          check python _packaging_artifact/**/*.whl _packaging_artifact/**/*.tar.gz
          check typescript _packaging_artifact/**/*.tgz
          check rust _packaging_artifact/**/*.crate
          if [ "$checked" -eq 0 ]; then
            echo "::error::packaging_artifact '${{ inputs.packaging_artifact }}' held no recognized built distribution (.whl / .tar.gz / .tgz / .crate)"
            exit 1
          fi
          echo "checked $checked built distribution(s); no test files shipped"
