name: Testing Conventions

# Reusable workflow: enforce a library's testing conventions in CI.
#
# Call it from a consumer repo, pinned to a tag:
#
#   jobs:
#     conventions:
#       uses: thekevinscott/testing-conventions/.github/workflows/testing-conventions.yml@v0
#       with:
#         path: src
#
# It runs the published `testing-conventions` binary via `npx` (a prebuilt,
# per-platform npm package — no Rust toolchain, no compile from source) as a
# single `check` job. `check` reads the config file and runs every rule its
# present `[python]` / `[typescript]` / `[rust]` tables enable — unit
# colocated-test, the Python unit-coverage floor, integration lint, and whatever
# lands next — failing the build on any violation.
#
# Which rules run is config-driven, so a newly-shipped rule enforces here
# automatically: there is no per-rule job to add. This single `check` job
# subsumed the old per-rule matrix (the separate colocated-test / unit-coverage /
# integration-lint jobs, #57 / #58 — see #56).

on:
  workflow_call:
    inputs:
      path:
        description: 'Directory scanned recursively for sources and tests.'
        type: string
        default: 'src'
      version:
        description: 'testing-conventions version to run, e.g. 0.1.0 (default: latest from npm).'
        type: string
        default: ''
      config:
        description: 'Config file whose [python]/[typescript]/[rust] tables decide which rules run.'
        type: string
        default: 'testing-conventions.toml'

permissions:
  contents: read

jobs:
  check:
    name: Testing conventions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # The Python unit-coverage rule shells out to coverage.py driving pytest, so
      # the toolchain is set up here. It's the only rule needing it today (coverage
      # is Python-only, #26) and sits unused when no `[python].coverage` floor is
      # configured — `check` derives what to run from the config, so the workflow
      # provisions for the heaviest rule unconditionally rather than parsing it.
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install coverage toolchain
        run: python -m pip install --quiet coverage pytest
      - name: Run testing-conventions check
        # node/npx ship on ubuntu-latest; `-y` skips the install prompt and
        # `${VERSION:+@...}` pins the version only when one was requested. Inputs
        # go through env (not interpolated into the shell) to avoid injection.
        env:
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          CONFIG: ${{ inputs.config }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" check --config "$CONFIG" "$SCAN_PATH"
