name: Testing Conventions

# Reusable, consumer-facing workflow: enforce a library's testing conventions in
# CI. Drop a single short file into your repo and opt into the full rule set with
# our defaults — no config required.
#
#   # .github/workflows/conventions.yml
#   name: Conventions
#   on: [pull_request]
#   jobs:
#     conventions:
#       uses: thekevinscott/testing-conventions/.github/workflows/testing-conventions.yml@v0
#
# The principle is **one consumer-facing rule command → one job**, fanned out per
# language. It runs the published `testing-conventions` binary via `npx` (a
# prebuilt, per-platform npm package — no Rust toolchain, no compile from source),
# failing the build on any violation. The shipped rule jobs are:
#
#   - unit colocated-test  — every source file has a colocated unit test (all langs)
#   - unit lint            — the unit-suite isolation lint (Python, TypeScript, Rust)
#   - unit coverage        — the unit coverage floor (Python, TypeScript, and Rust
#                            via cargo-llvm-cov, #37)
#   - integration lint     — the integration mocking lints (Python, TypeScript, Rust)
#   - packaging            — no test files in the built distribution
#
# Diff-scoped variants run as their own jobs on `pull_request` only (they need
# `fetch-depth: 0` and a base ref): `unit colocated-test --base` (co-change, #161),
# `unit coverage --base` (changed-line coverage, #162), and `unit mutation --base`
# (#204) — the mutation gate, binary and on by default, scoped to the changed lines
# because whole-tree mutation is too slow to gate. An
# `e2e verify` job (#68) checks the committed e2e attestation; it's default-on,
# verify-if-present — it runs whenever an `e2e-attestation.json` is committed, and
# `run_e2e` forces it on (#186).
#
# The `detect` job runs the repo-only detect action (`.github/actions/detect`, tested
# by pytest, #189): it scans `path` and auto-detects every supported language *present*
# (#185), and the rule jobs fan out over those. `languages` is an optional restrictor
# (empty default ⇒ auto-detect all; a JSON array ⇒ only those named), so the zero-input
# drop-in covers Python, TypeScript, and Rust alike. A language with no sources under
# `path` is dropped from the matrix and skipped, not failed (#94). The action also
# recognizes a crate (`Cargo.toml` / `*.rs`) and emits separate
# `integration_lint_languages`, `isolation_languages`, and `coverage_languages` sets
# that add Rust, plus `packaging_dist` / `e2e_attestation` flags the packaging and
# e2e-verify jobs gate on (#186).
#
# The Packaging rule (#41) is the exception: it inspects the *built distribution*,
# not the source tree, so it doesn't ride the source matrix. It's default-on,
# locate-or-skip (#186): it runs over a conventional dist/ found in the checkout, or
# over a named `packaging_artifact` you upload with actions/upload-artifact, and fails
# if any .whl/.tar.gz (python), .tgz (typescript), or .crate (rust) ships a test file
# (skipped, never failed, when neither a dist/ nor an artifact exists):
#
#   jobs:
#     build:
#       runs-on: ubuntu-latest
#       steps:
#         - run: python -m build            # → dist/*.whl, dist/*.tar.gz
#         - uses: actions/upload-artifact@v7
#           with: { name: dist, path: dist/ }
#     conventions:
#       needs: build
#       uses: thekevinscott/testing-conventions/.github/workflows/testing-conventions.yml@v0
#       with:
#         packaging_artifact: dist
#
# No config file is required: every check runs with sane defaults, opting a new
# library into the full set in one drop-in (#80). The coverage floor falls back to
# the language's strict default — a 100% line floor for all three (#194/#195): Python
# branch on at 100, TypeScript all four metrics at 100, and Rust `lines = 100` with
# `regions` opt-in and no branch component (#206) — when no `testing-conventions.toml`
# is present. Add a config file only to loosen a floor or declare exemptions.
#
# `languages` is a JSON array (when set) so the matrix can fan out over it directly
# (reusable-workflow inputs can't be native lists); empty — the default — means
# auto-detect every supported language present under `path` (#185).
#
# `build_command` (#243) is an optional shell step run after toolchain + dependency setup
# and before the suite, in the same job, for the suite-executing jobs only — `unit coverage`
# (whole-tree), `unit coverage --base` (changed-line), and `unit mutation`. A native-binding
# project whose unit suite imports a compiled module (a maturin/PyO3 extension, a napi-rs
# addon) needs it built first, or the suite fails at import before the gate runs; set
# `build_command: "uv run maturin develop"` / `"pnpm build"`. Empty (the default) ⇒ no build
# step, so pure-language callers are unaffected. The static rules (colocated-test, unit lint,
# integration lint) only parse source, and `e2e verify` checks the attestation rather than
# running the e2e suite, so none of those jobs build or import anything.

on:
  workflow_call:
    inputs:
      languages:
        description: 'Optional JSON array restricting which languages to check, e.g. ["python"]. Empty (the default) auto-detects every supported language present under `path` (#185).'
        type: string
        default: ''
      path:
        description: 'Directory scanned recursively for sources.'
        type: string
        default: 'src'
      version:
        description: 'testing-conventions version to run, e.g. 0.1.0 (default: latest from npm).'
        type: string
        default: ''
      config:
        description: 'Optional config file to refine the checks (coverage thresholds, exemptions). If absent, every check runs with sane defaults.'
        type: string
        default: 'testing-conventions.toml'
      base:
        description: 'Base ref for the diff-scoped `--base` jobs, diffed as `<base>...HEAD`. Used by the `*-changed` jobs, which run on `pull_request` only and check out full history.'
        type: string
        default: 'origin/main'
      run_e2e:
        description: 'Force the `e2e verify` job (#68 freshness gate) on. It is already default-on when a committed `e2e-attestation.json` is present (#186); set this to run it regardless. Needs the attestation and full git history.'
        type: boolean
        default: false
      packaging_artifact:
        description: 'Name of an uploaded build artifact (actions/upload-artifact) holding the built distributions (.whl/.tar.gz/.tgz/.crate) to check. When set, the packaging job downloads and inspects it. When empty (default), packaging still runs over a conventional dist/ found in the checkout, and is skipped only when no dist/ exists either (#186).'
        type: string
        default: ''
      build_command:
        description: 'Optional shell command run after toolchain + dependency setup and before the suite, in the same job, for the suite-executing jobs only (unit coverage, changed-line coverage, unit mutation). Use it to build a native module the suite imports — e.g. "uv run maturin develop" (Python/maturin) or "pnpm build" (TypeScript/napi). Empty (default) ⇒ no build step, so pure-language callers are unaffected. The static rules (colocated-test, unit lint, integration lint) only parse source and the e2e-verify job never runs the suite, so none of them run it (#243).'
        type: string
        default: ''

permissions:
  contents: read

jobs:
  detect:
    name: Detect requested languages with sources
    runs-on: ubuntu-latest
    outputs:
      # JSON array of the requested python/typescript languages with sources under
      # `path` — the matrix the colocated-test job (and the co-change `*-changed`
      # job) fans out over.
      languages: ${{ steps.scan.outputs.languages }}
      # The same set plus rust — the matrix the integration-lint job fans out over
      # (#126).
      integration_lint_languages: ${{ steps.scan.outputs.integration_lint_languages }}
      # `unit lint` (#125): python/typescript + rust, also kept off the coverage matrix.
      isolation_languages: ${{ steps.scan.outputs.isolation_languages }}
      # `unit coverage` (#37/#171): present python/typescript, plus rust whenever a
      # crate is present — Rust coverage is zero-config now (`lines = 100` by default,
      # #206) — the matrix the whole-tree and changed-line coverage jobs fan out over.
      # Kept as its own set so a future coverage-less language can diverge.
      coverage_languages: ${{ steps.scan.outputs.coverage_languages }}
      # `unit mutation` (#204): the same set as coverage now that all three arms are at
      # parity (#201/#202/#203) — the matrix the diff-scoped mutation job fans out over.
      mutation_languages: ${{ steps.scan.outputs.mutation_languages }}
      # Whether a built distribution is discoverable in the checkout, and whether a
      # committed e2e-attestation.json is present (#186) — the packaging and e2e-verify
      # jobs gate on these so they run by default and skip (never fail) when absent.
      packaging_dist: ${{ steps.scan.outputs.packaging_dist }}
      e2e_attestation: ${{ steps.scan.outputs.e2e_attestation }}
    steps:
      - uses: actions/checkout@v6
      - id: scan
        # Detection lives in the repo-only composite action (.github/actions/detect),
        # tested by pytest (#189). The reusable workflow uses it at the same @v0 the
        # consumer pins, so GitHub fetches the action's files without a checkout hack.
        uses: thekevinscott/testing-conventions/.github/actions/detect@v0
        with:
          languages: ${{ inputs.languages }}
          path: ${{ inputs.path }}

  colocated-test:
    name: Colocated test (${{ matrix.language }})
    needs: detect
    # Only the requested languages with sources present (#94); skip the job
    # entirely when that leaves nothing.
    if: needs.detect.outputs.languages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.languages) }}
    steps:
      - uses: actions/checkout@v6
      - name: Check colocated test
        # node/npx ship on ubuntu-latest; `-y` skips the install prompt and
        # `${VERSION:+@...}` pins the version only when one was requested.
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          # Forward the config so `exempt` entries apply to the whole-tree check,
          # matching every other job (lint / coverage / co-change / mutation).
          CONFIG: ${{ inputs.config }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" unit colocated-test --language "$LANGUAGE" --config "$CONFIG" "$SCAN_PATH"

  colocated-test-changed:
    name: Colocated test — co-change (${{ matrix.language }})
    needs: detect
    # Diff-scoped co-change (#161): on a PR, a modified or deleted source whose
    # colocated test didn't co-change fails. Rust is excluded by the rule (inline
    # `#[cfg(test)]` units can't go stale), so this rides the python/typescript
    # `languages` set. PR-only — it needs a base ref and full history.
    if: ${{ github.event_name == 'pull_request' && needs.detect.outputs.languages != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.languages) }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Co-change diffs `<base>...HEAD`, so the base ref must be reachable.
          fetch-depth: 0
      - name: Check co-change vs ${{ inputs.base }}
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          CONFIG: ${{ inputs.config }}
          BASE: ${{ inputs.base }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" unit colocated-test --language "$LANGUAGE" --base "$BASE" --config "$CONFIG" "$SCAN_PATH"

  unit-lint:
    name: Unit lint (${{ matrix.language }})
    needs: detect
    # `unit lint` is a static AST check (no language toolchain), like
    # colocated-test — a cheap matrix job, not a toolchain-heavy one like coverage.
    # It enforces the rule for Python (#42), TypeScript (#43/#76/#77), and Rust (#44).
    # The matrix is `isolation_languages` — the requested-and-present set, which
    # (unlike `languages`) includes rust — so a requested-but-absent language is
    # skipped, not failed. #56 (config-driven `check`) will later drive which
    # rules/languages run here.
    if: needs.detect.outputs.isolation_languages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.isolation_languages) }}
    steps:
      - uses: actions/checkout@v6
      - name: Check unit lint
        # Static check — just the binary via npx, no toolchain. `--config` applies
        # the #102 `[[<language>.exempt]]` waivers, like the other unit jobs.
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          CONFIG: ${{ inputs.config }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" unit lint --language "$LANGUAGE" --config "$CONFIG" "$SCAN_PATH"

  unit-coverage:
    name: Unit-test coverage (${{ matrix.language }})
    needs: detect
    # `unit coverage` enforces the Python (#26), TypeScript (#31), and Rust (#37)
    # floors. The matrix is `coverage_languages` — the requested languages with
    # sources present (#94), plus rust whenever a crate is here (Rust coverage is
    # zero-config now, `lines = 100` by default, #206) — so a requested-but-absent
    # language is skipped rather than erroring. #56 (config-driven `check`) will
    # eventually drive this from the config file.
    if: needs.detect.outputs.coverage_languages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.coverage_languages) }}
    steps:
      - uses: actions/checkout@v6
      # Unlike the static colocated-test / lint checks, `unit coverage` shells out
      # to the language's coverage tool — so its toolchain, and the project's own
      # test deps, must be present. Set up per language.
      - if: matrix.language == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - if: matrix.language == 'python'
        name: Install coverage toolchain (coverage.py + pytest)
        run: python -m pip install --quiet coverage pytest
      # TypeScript shells out to vitest, so install the project's deps (including
      # vitest + @vitest/coverage-v8) with pnpm, the TS convention. A project on a
      # different package manager should drive the CLI directly until #56 makes
      # this config-driven.
      - if: matrix.language == 'typescript'
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - if: matrix.language == 'typescript'
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - if: matrix.language == 'typescript'
        name: Install project dependencies (pnpm)
        run: pnpm install --frozen-lockfile
      # Rust shells out to cargo-llvm-cov (#37/#171): a stable toolchain with the
      # llvm-tools component, plus cargo-llvm-cov itself.
      - if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - if: matrix.language == 'rust'
        name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      # Build a caller-supplied native module before the suite imports it (#243): a
      # PyO3/maturin or napi-rs addon the unit suite `import`s must be compiled here, in
      # this job, or coverage fails at import. Pure-language callers leave `build_command`
      # empty and skip this. Passed via env (not interpolated into `run`) and `eval`-ed so
      # a full shell string — `uv run maturin develop`, `pnpm build`, `a && b` — works.
      - if: inputs.build_command != ''
        name: Run the build step (build_command)
        env:
          BUILD_COMMAND: ${{ inputs.build_command }}
        run: |
          set -euo pipefail
          eval "$BUILD_COMMAND"
      - name: Check unit-test coverage
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          CONFIG: ${{ inputs.config }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" unit coverage --language "$LANGUAGE" --config "$CONFIG" "$SCAN_PATH"

  coverage-changed:
    name: Unit-test coverage — changed lines (${{ matrix.language }})
    needs: detect
    # Diff-scoped changed-line coverage (#162): on a PR, the configured floor is
    # measured over only the `<base>...HEAD` changed lines, so a changed line below
    # the floor fails no matter how small the diff. Mirrors the whole-tree
    # unit-coverage job's per-language toolchain setup; PR-only (needs the base ref).
    if: ${{ github.event_name == 'pull_request' && needs.detect.outputs.coverage_languages != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.coverage_languages) }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Changed-line coverage diffs `<base>...HEAD`, so the base ref must be
          # reachable.
          fetch-depth: 0
      - if: matrix.language == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - if: matrix.language == 'python'
        name: Install coverage toolchain (coverage.py + pytest)
        run: python -m pip install --quiet coverage pytest
      - if: matrix.language == 'typescript'
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - if: matrix.language == 'typescript'
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - if: matrix.language == 'typescript'
        name: Install project dependencies (pnpm)
        run: pnpm install --frozen-lockfile
      - if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - if: matrix.language == 'rust'
        name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      # Build a caller-supplied native module before the suite imports it (#243), as in the
      # whole-tree coverage job; empty `build_command` ⇒ skipped.
      - if: inputs.build_command != ''
        name: Run the build step (build_command)
        env:
          BUILD_COMMAND: ${{ inputs.build_command }}
        run: |
          set -euo pipefail
          eval "$BUILD_COMMAND"
      - name: Check changed-line coverage vs ${{ inputs.base }}
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          CONFIG: ${{ inputs.config }}
          BASE: ${{ inputs.base }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" unit coverage --language "$LANGUAGE" --base "$BASE" --config "$CONFIG" "$SCAN_PATH"

  mutation:
    name: Unit mutation — changed lines (${{ matrix.language }})
    needs: detect
    # `unit mutation` (#204) — the rung above coverage: a test that *runs* a changed
    # line still passes if you delete its assertions, and a surviving mutant proves it.
    # The gate is binary and on by default (no report-only mode): an un-exempted survivor
    # on a changed line fails the build, with reasoned `[[<lang>.exempt]] rules =
    # ["mutation"]` entries the only loosening. Whole-tree mutation is too slow to gate,
    # so this is **PR-only and diff-scoped** (`--base`, like coverage-changed) — only the
    # mutants on the `<base>...HEAD` changed lines are run. The matrix is
    # `mutation_languages` (the coverage set; all three arms are at parity, #201/#202/#203).
    # `mutation_languages` is a new detect output, so until a release moves `@v0` to a
    # detect that emits it (this PR's own run still pins the old `@v0`), it's empty — fall
    # back to `coverage_languages` (the identical set) so the matrix stays valid.
    if: ${{ github.event_name == 'pull_request' && (needs.detect.outputs.mutation_languages || needs.detect.outputs.coverage_languages) != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.mutation_languages || needs.detect.outputs.coverage_languages) }}
    steps:
      - uses: actions/checkout@v6
        with:
          # `--base` diffs `<base>...HEAD`, so the base ref must be reachable.
          fetch-depth: 0
      # Like coverage, `unit mutation` shells out to the language's mutation engine, so
      # its toolchain — and the project's own test deps — must be present. Set up per
      # language. #56 (config-driven `check`) will eventually drive this from config.
      - if: matrix.language == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - if: matrix.language == 'python'
        name: Install the Python mutation toolchain (wheel + pytest)
        # `unit mutation --language python` spawns the adapter shipped in the wheel
        # (`python3 -m testing_conventions.mutation.main`, #248); installing the wheel puts
        # that module on the path and brings cosmic-ray as a dependency. pytest runs the
        # project's suite. (#258 — cosmic-ray alone left the adapter module unresolvable.)
        # The wheel is named last so the subcommand-drift guard (#92) doesn't read the
        # package that follows the binary name as a `testing-conventions` invocation.
        run: python -m pip install --quiet pytest testing-conventions
      # TypeScript drives Stryker, which runs the project's test runner — install the
      # project's deps (which must include @stryker-mutator/core and a runner plugin)
      # with pnpm, the TS convention.
      - if: matrix.language == 'typescript'
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - if: matrix.language == 'typescript'
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - if: matrix.language == 'typescript'
        name: Install project dependencies (pnpm)
        run: pnpm install --frozen-lockfile
      # Rust drives cargo-mutants over the crate. The published CLI provisions the engine
      # itself now (#242) — a pinned `cargo install` into its cache on first use — so only the
      # cargo toolchain is set up here; cache that dir so the from-source install is reused.
      - if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable
      - if: matrix.language == 'rust'
        name: Cache the provisioned cargo-mutants
        uses: actions/cache@v4
        with:
          path: ~/.cache/testing-conventions
          key: cargo-mutants-provision-${{ runner.os }}
      # Build a caller-supplied native module before the mutation engine runs the suite
      # (#243): cosmic-ray / Stryker / cargo-mutants import the same module, so it must be
      # compiled here too; empty `build_command` ⇒ skipped.
      - if: inputs.build_command != ''
        name: Run the build step (build_command)
        env:
          BUILD_COMMAND: ${{ inputs.build_command }}
        run: |
          set -euo pipefail
          eval "$BUILD_COMMAND"
      - name: Check mutation on the lines changed vs ${{ inputs.base }}
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          CONFIG: ${{ inputs.config }}
          BASE: ${{ inputs.base }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" unit mutation --language "$LANGUAGE" --base "$BASE" --config "$CONFIG" "$SCAN_PATH"

  integration-lint:
    name: Integration lint (${{ matrix.language }})
    needs: detect
    # `integration lint` (mocking mechanism & style) ships for Python (#58),
    # TypeScript (#43/#75), and Rust (#44), so the matrix fans out over every
    # requested language with sources present — the `integration_lint_languages` set,
    # which adds rust on top of the colocated languages (#126). Skipped — not
    # failed — when that set is empty. #56 (config-driven `check`) will eventually
    # drive which rules/languages run here.
    if: needs.detect.outputs.integration_lint_languages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.integration_lint_languages) }}
    steps:
      - uses: actions/checkout@v6
      - name: Lint integration tests
        # `--config` so a consumer's #102 waivers are honored, matching the
        # unit-coverage job (an absent file waives nothing).
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          CONFIG: ${{ inputs.config }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" integration lint --language "$LANGUAGE" --config "$CONFIG" "$SCAN_PATH"

  e2e-verify:
    name: E2E attestation freshness (e2e verify)
    needs: detect
    # Default-on, verify-if-present (#186): run the #68 freshness gate whenever a
    # committed `e2e-attestation.json` is present (detected by the detect action) —
    # verify it names the latest code commit, failing (with a re-attest nudge) when the
    # code has moved on. A repo with no attestation is skipped, never failed; `run_e2e`
    # forces the job on. Never runs the e2e suite itself.
    if: ${{ inputs.run_e2e || needs.detect.outputs.e2e_attestation == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # `e2e verify` finds the latest code commit via `git log`, so it needs
          # full history — a shallow clone would miss it.
          fetch-depth: 0
      - name: Verify the e2e attestation is current
        env:
          VERSION: ${{ inputs.version }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" e2e verify

  packaging:
    name: Packaging (no test files in the built artifact)
    needs: detect
    # Default-on, locate-or-skip (#186): packaging inspects the *built distribution*, not
    # the source tree, so it doesn't ride the source matrix — but it runs by default. It
    # runs when an explicit `packaging_artifact` was uploaded OR the detect action found a
    # conventional dist/ in the checkout, and is skipped — never failed — when neither
    # exists. Each distribution's language is inferred from its extension.
    if: ${{ inputs.packaging_artifact != '' || needs.detect.outputs.packaging_dist == 'true' }}
    runs-on: ubuntu-latest
    steps:
      # Acquire the distributions one of two ways: a named upload artifact, or the
      # committed dist/ in the consumer checkout (#186).
      - name: Download the uploaded distributions
        if: inputs.packaging_artifact != ''
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.packaging_artifact }}
          path: _packaging_artifact
      - name: Check out the repository to inspect its dist/
        if: inputs.packaging_artifact == ''
        uses: actions/checkout@v6
      - name: Check the built distributions ship no test files
        env:
          VERSION: ${{ inputs.version }}
          PACKAGING_ARTIFACT: ${{ inputs.packaging_artifact }}
        run: |
          set -euo pipefail
          # nullglob: an unmatched glob expands to nothing (not the literal);
          # globstar: `**` recurses, so a nested dist is found too.
          shopt -s nullglob globstar
          # The downloaded artifact when one was named, else the located dist/.
          if [ -n "$PACKAGING_ARTIFACT" ]; then dist_root=_packaging_artifact; else dist_root=dist; fi
          # Language is inferred from the distribution's extension: a wheel/sdist is
          # python, an `npm pack` tarball is typescript, a Cargo crate is rust.
          checked=0
          check () {
            local lang="$1"; shift
            for dist in "$@"; do
              echo "::group::packaging --language $lang $dist"
              npx -y "testing-conventions${VERSION:+@$VERSION}" packaging "$dist" --language "$lang"
              echo "::endgroup::"
              checked=$((checked + 1))
            done
          }
          check python "$dist_root"/**/*.whl "$dist_root"/**/*.tar.gz
          check typescript "$dist_root"/**/*.tgz
          check rust "$dist_root"/**/*.crate
          if [ "$checked" -eq 0 ]; then
            echo "::error::no recognized built distribution (.whl / .tar.gz / .tgz / .crate) found in '$dist_root'"
            exit 1
          fi
          echo "checked $checked built distribution(s); no test files shipped"
