name: Testing Conventions

# Reusable workflow: enforce a library's testing conventions in CI.
#
# Call it from a consumer repo, pinned to a tag:
#
#   jobs:
#     conventions:
#       uses: thekevinscott/testing-conventions/.github/workflows/testing-conventions.yml@v0
#       with:
#         languages: python,typescript
#         path: src
#
# It installs the published `testing-conventions` binary (one Rust core, from
# crates.io) and runs each rule for every requested language as its own matrix
# job, failing the build on any violation. Today that is the unit-test
# location/naming check; as more rules land they run here too.
#
# "Every configured language" is explicit via `languages` for now; once the
# config-driven `check` umbrella is wired this will read the config file itself.

on:
  workflow_call:
    inputs:
      languages:
        description: 'Comma-separated languages to check (python, typescript).'
        type: string
        default: 'python,typescript'
      path:
        description: 'Directory scanned recursively for sources.'
        type: string
        default: 'src'
      version:
        description: 'testing-conventions version to install (default: latest from crates.io).'
        type: string
        default: ''

permissions:
  contents: read

jobs:
  # Turn the comma-separated `languages` input into a JSON array the matrix below
  # fans out over (trims whitespace, drops empties, errors if nothing is left).
  setup:
    name: Resolve languages
    runs-on: ubuntu-latest
    outputs:
      languages: ${{ steps.parse.outputs.languages }}
    steps:
      - id: parse
        env:
          LANGUAGES: ${{ inputs.languages }}
        run: |
          langs="$(jq -Rc 'split(",") | map(gsub("^ +| +$";"")) | map(select(length > 0))' <<< "$LANGUAGES")"
          [ "$(jq length <<< "$langs")" -gt 0 ] || { echo "::error::no languages to check"; exit 1; }
          echo "languages=$langs" >> "$GITHUB_OUTPUT"

  unit-location:
    name: Unit-test location (${{ matrix.language }})
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.setup.outputs.languages) }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install testing-conventions
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$VERSION" ]; then
            cargo install testing-conventions --locked --version "$VERSION"
          else
            cargo install testing-conventions --locked
          fi
      # NOTE: the command surface tracks issue #22 (unit-location -> `unit location`,
      # --lang -> a required --language); update the invocation below when it lands.
      - name: Check unit-test location
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
        run: testing-conventions unit-location --lang "$LANGUAGE" "$SCAN_PATH"
