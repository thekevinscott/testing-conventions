name: Testing Conventions

# Reusable, consumer-facing workflow: enforce a library's testing conventions in
# CI. Drop a single short file into your repo and opt into the full rule set with
# our defaults — no config required.
#
#   # .github/workflows/conventions.yml
#   name: Conventions
#   on: [pull_request]
#   jobs:
#     conventions:
#       uses: thekevinscott/testing-conventions/.github/workflows/testing-conventions.yml@v0
#
# The principle is **one consumer-facing rule command → one job**, fanned out per
# language. It runs the published `testing-conventions` binary via `npx` (a
# prebuilt, per-platform npm package — no Rust toolchain, no compile from source),
# failing the build on any violation. The shipped rule jobs are:
#
#   - unit colocated-test  — every source file has a colocated unit test (all langs;
#                            the rust arm checks inline `#[cfg(test)]` presence, #40/#274)
#   - unit lint            — the unit-suite isolation lint (Python, TypeScript, Rust)
#   - unit coverage        — the unit coverage floor (Python, TypeScript, and Rust
#                            via cargo-llvm-cov, #37)
#   - integration lint     — the integration mocking lints (Python, TypeScript, Rust)
#   - packaging            — no test files in the built distribution
#
# Diff-scoped variants run as their own jobs on `pull_request` only (they need
# `fetch-depth: 0` and a base ref): `unit colocated-test --base` (co-change, #161),
# `unit coverage --base` (changed-line coverage, #162), and `unit mutation --base`
# (#204) — the mutation gate, binary and on by default, scoped to the changed lines
# because whole-tree mutation is too slow to gate. An
# `e2e verify` job (#68) checks the committed e2e attestation; it's default-on,
# verify-if-present — it runs whenever an `e2e-attestation.json` is committed, and
# `run_e2e` forces it on (#186).
#
# The `detect` job runs the repo-only detect action (`.github/actions/detect`, tested
# by pytest, #189): it scans `path` and auto-detects every supported language *present*
# (#185), and the rule jobs fan out over those. `languages` is an optional restrictor
# (empty default ⇒ auto-detect all; a JSON array ⇒ only those named), so the zero-input
# drop-in covers Python, TypeScript, and Rust alike. A language with no sources under
# `path` is dropped from the matrix and skipped, not failed (#94). The action also
# recognizes a crate (`Cargo.toml` / `*.rs`) and emits separate
# `colocated_test_languages` (#274), `integration_lint_languages`,
# `isolation_languages`, and `coverage_languages` sets that add Rust, plus
# `packaging_dist` / `e2e_attestation` flags the packaging and e2e-verify jobs gate
# on (#186). Only the co-change `*-changed` job stays on the python/typescript
# `languages` set — rust units are inline, so a sibling test can't go stale.
#
# The Packaging rule (#41) is the exception: it inspects the *built distribution*,
# not the source tree, so it doesn't ride the source matrix. It's default-on,
# locate-or-skip (#186): it runs over a conventional dist/ found in the checkout, or
# over a named `packaging_artifact` you upload with actions/upload-artifact, and fails
# if any .whl/.tar.gz (python), .tgz (typescript), or .crate (rust) ships a test file
# (skipped, never failed, when neither a dist/ nor an artifact exists):
#
#   jobs:
#     build:
#       runs-on: ubuntu-latest
#       steps:
#         - run: python -m build            # → dist/*.whl, dist/*.tar.gz
#         - uses: actions/upload-artifact@v7
#           with: { name: dist, path: dist/ }
#     conventions:
#       needs: build
#       uses: thekevinscott/testing-conventions/.github/workflows/testing-conventions.yml@v0
#       with:
#         packaging_artifact: dist
#
# No config file is required: every check runs with sane defaults, opting a new
# library into the full set in one drop-in (#80). The coverage floor falls back to
# the language's strict default — a 100% line floor for all three (#194/#195): Python
# branch on at 100, TypeScript all four metrics at 100, and Rust `lines = 100` with
# `regions` opt-in and no branch component (#206) — when no `testing-conventions.toml`
# is present. Add a config file only to loosen a floor or declare exemptions.
#
# `languages` is a JSON array (when set) so the matrix can fan out over it directly
# (reusable-workflow inputs can't be native lists); empty — the default — means
# auto-detect every supported language present under `path` (#185).
#
# `unit coverage` (whole-tree) and `unit coverage --base` (changed-line) install, provision,
# and build at the *derived package root* (#277/#278) — the nearest directory at-or-above
# `path`, down to the checkout root, holding a `package.json` / `pyproject.toml` / `Cargo.toml`
# (`.` for a single-package repo, so an existing single-package call is unaffected). The
# TypeScript package manager, the Python environment model (plain `pip`, or `uv sync` for a
# `pyproject.toml` with a `[project]` table — which also builds a maturin package's native
# module), and whether a Rust toolchain is auto-provisioned are all read from that root's own
# manifest, so a per-package-lockfile monorepo package (dirsql PR #410) installs and builds
# correctly with no configuration.
#
# `build_command` (#243) and `rust_toolchain` (#263) are the remaining *escape hatches*, for a
# build the package manifest cannot express, run/provisioned at that same derived package root.
# `build_command` is an optional shell step run after toolchain + dependency setup and before
# the suite, in the same job, for the suite-executing jobs only — `unit coverage` (whole-tree),
# `unit coverage --base` (changed-line), and `unit mutation` (still checkout-root scoped;
# #278 covers only the coverage jobs). Set `build_command: "uv run maturin develop"` /
# `"pnpm build"` for a build the auto-derivation above does not cover. Empty (the default) ⇒ no
# build step, so pure-language callers are unaffected. The static rules (colocated-test, unit
# lint, integration lint) only parse source, and `e2e verify` checks the attestation rather than
# running the e2e suite, so none of those jobs build or import anything.
#
# `gates` (#262) is an optional allowlist naming which gates run — empty (the default) runs
# every applicable gate. The seven gate names are colocated-test, unit-lint, unit-coverage,
# mutation, integration-lint, packaging, and e2e-verify; a named gate still applies its own
# conditions (language presence, the PR event, a discoverable dist/attestation), and its
# diff-scoped variant rides with it (colocated-test covers the co-change job, unit-coverage
# the changed-line job). The allowlist is authoritative: a gate left out is skipped even when
# its forcing input (`run_e2e`, `packaging_artifact`) is set, so a scoped call stays scoped.
# Membership is the quoted-name test `contains(inputs.gates, '"<gate>"')` — the same check
# detect.py's `eligible` applies to `languages` — so a consumer that must run the
# suite-executing gates in its own build-capable jobs (a native binding whose second-language
# core these jobs cannot build, #263) still adopts the static gates here.
#
# `rust_toolchain` (#263) is the manual override that provisions a stable Rust toolchain — with
# a cargo registry + target cache — in the suite-executing jobs, before `build_command` runs.
# `unit coverage` / `unit coverage --base` already auto-provision it whenever the package root's
# manifest declares a Rust-compiling build (#277); set this by hand only for a build the
# manifest does not express, or for `unit mutation`, which does not yet derive it. The rust
# matrix arm always carries its own toolchain. `false` (the default) adds nothing beyond
# auto-derivation.

on:
  workflow_call:
    inputs:
      languages:
        description: 'Optional JSON array restricting which languages to check, e.g. ["python"]. Empty (the default) auto-detects every supported language present under `path` (#185).'
        type: string
        default: ''
      path:
        description: 'Directory scanned recursively for sources.'
        type: string
        default: 'src'
      version:
        description: 'testing-conventions version to run, e.g. 0.1.0 (default: latest from npm).'
        type: string
        default: ''
      config:
        description: 'Optional config file to refine the checks (coverage thresholds, exemptions). If absent, every check runs with sane defaults.'
        type: string
        default: 'testing-conventions.toml'
      base:
        description: 'Base ref for the diff-scoped `--base` jobs, diffed as `<base>...HEAD`. Used by the `*-changed` jobs, which run on `pull_request` only and check out full history.'
        type: string
        default: 'origin/main'
      run_e2e:
        description: 'Force the `e2e verify` job (#68 freshness gate) on. It is already default-on when a committed `e2e-attestation.json` is present (#186); set this to run it regardless. Needs the attestation and full git history.'
        type: boolean
        default: false
      packaging_artifact:
        description: 'Name of an uploaded build artifact (actions/upload-artifact) holding the built distributions (.whl/.tar.gz/.tgz/.crate) to check. When set, the packaging job downloads and inspects it. When empty (default), packaging still runs over a conventional dist/ found in the checkout, and is skipped only when no dist/ exists either (#186).'
        type: string
        default: ''
      build_command:
        description: 'Escape hatch: an optional shell command run at the derived package root (#277/#278), after toolchain + dependency setup and before the suite, in the same job, for the suite-executing jobs only (unit coverage, changed-line coverage, unit mutation). unit coverage / changed-line coverage already build a maturin package (uv sync) or a napi package (its own prepare script) with no input set; set this only for a build the package manifest cannot express — e.g. "uv run maturin develop" or "pnpm build" for a manifest-less build step. Empty (default) means no build step, so pure-language callers are unaffected. The static rules (colocated-test, unit lint, integration lint) only parse source and the e2e-verify job never runs the suite, so none of them run it (#243).'
        type: string
        default: ''
      gates:
        description: 'Optional JSON array naming which gates run, e.g. ["colocated-test", "unit-lint", "integration-lint"] (#262). Empty (the default) runs every applicable gate. Gate names: colocated-test, unit-lint, unit-coverage, mutation, integration-lint, packaging, e2e-verify. A named gate still applies its own conditions, and its diff-scoped variant rides with it (colocated-test covers the co-change job, unit-coverage the changed-line job). The allowlist is authoritative: a gate left out is skipped even when run_e2e / packaging_artifact is set.'
        type: string
        default: ''
      rust_toolchain:
        description: 'Manual override: provision a stable Rust toolchain (with a cargo registry + target cache) in the suite-executing jobs, before build_command runs. unit coverage / changed-line coverage already auto-provision it when the manifest at the derived package root declares a Rust-compiling build (a Cargo.toml, a maturin backend, a napi key — #277); set this by hand only for a build the manifest does not express, or for unit mutation, which does not yet derive it. The rust matrix arm always carries its own toolchain. false (the default) adds nothing beyond auto-derivation (#263).'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  detect:
    name: Detect requested languages with sources
    runs-on: ubuntu-latest
    outputs:
      # JSON array of the requested python/typescript languages with sources under
      # `path` — the matrix the co-change `*-changed` job fans out over (rust units
      # are inline `#[cfg(test)]` modules, so a sibling test can't go stale and
      # co-change doesn't apply).
      languages: ${{ steps.scan.outputs.languages }}
      # The same set plus rust — the whole-tree colocated-test matrix (#274): the
      # rust arm checks inline `#[cfg(test)]` presence (#40).
      colocated_test_languages: ${{ steps.scan.outputs.colocated_test_languages }}
      # The same set plus rust — the matrix the integration-lint job fans out over
      # (#126).
      integration_lint_languages: ${{ steps.scan.outputs.integration_lint_languages }}
      # `unit lint` (#125): python/typescript + rust, also kept off the coverage matrix.
      isolation_languages: ${{ steps.scan.outputs.isolation_languages }}
      # `unit coverage` (#37/#171): present python/typescript, plus rust whenever a
      # crate is present — Rust coverage is zero-config now (`lines = 100` by default,
      # #206) — the matrix the whole-tree and changed-line coverage jobs fan out over.
      # Kept as its own set so a future coverage-less language can diverge.
      coverage_languages: ${{ steps.scan.outputs.coverage_languages }}
      # `unit mutation` (#204): the same set as coverage now that all three arms are at
      # parity (#201/#202/#203) — the matrix the diff-scoped mutation job fans out over.
      mutation_languages: ${{ steps.scan.outputs.mutation_languages }}
      # Whether a built distribution is discoverable at the derived package_root (#280;
      # the checkout root for every single-package consumer), and whether a committed
      # e2e-attestation.json is present at the checkout root (#186) — the packaging and
      # e2e-verify jobs gate on these so they run by default and skip (never fail) when
      # absent.
      packaging_dist: ${{ steps.scan.outputs.packaging_dist }}
      e2e_attestation: ${{ steps.scan.outputs.e2e_attestation }}
      # The monorepo primitive (#277): everything a suite-executing job needs to install,
      # build, and run at the right directory, derived from `path` and the package's own
      # manifest rather than a second, consumer-facing scoping input.
      package_root: ${{ steps.scan.outputs.package_root }}
      ts_package_manager: ${{ steps.scan.outputs.ts_package_manager }}
      python_env: ${{ steps.scan.outputs.python_env }}
      provision_rust: ${{ steps.scan.outputs.provision_rust }}
      # The config file every job's `--config` should receive (#277): `inputs.config`
      # verbatim unless it's the default, in which case a package-root
      # testing-conventions.toml wins if present — so a per-package call stops naming it.
      config: ${{ steps.scan.outputs.config }}
    steps:
      - uses: actions/checkout@v6
      - id: scan
        # Detection lives in the repo-only composite action (.github/actions/detect),
        # tested by pytest (#189). The reusable workflow uses it at the same @v0 the
        # consumer pins, so GitHub fetches the action's files without a checkout hack.
        uses: thekevinscott/testing-conventions/.github/actions/detect@v0
        with:
          languages: ${{ inputs.languages }}
          path: ${{ inputs.path }}
          config: ${{ inputs.config }}

  colocated-test:
    name: Colocated test (${{ matrix.language }})
    needs: detect
    # Only the requested languages with sources present (#94); skip the job
    # entirely when that leaves nothing, or when a `gates` allowlist leaves the
    # colocated-test gate out (#262). The matrix is `colocated_test_languages`
    # (#274) — the file-paired languages plus rust, whose arm checks inline
    # `#[cfg(test)]` presence (#40). That's a new detect output, so until a
    # release moves `@v0` to a detect that emits it (this PR's own run still pins
    # the old `@v0`), it's empty — fall back to `languages` (the python/typescript
    # set) so the matrix stays valid, the #204 `mutation_languages` pattern.
    if: ${{ (inputs.gates == '' || contains(inputs.gates, '"colocated-test"')) && (needs.detect.outputs.colocated_test_languages || needs.detect.outputs.languages) != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.colocated_test_languages || needs.detect.outputs.languages) }}
    steps:
      - uses: actions/checkout@v6
      - name: Check colocated test
        # node/npx ship on ubuntu-latest; `-y` skips the install prompt and
        # `${VERSION:+@...}` pins the version only when one was requested.
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          # Forward the config so `exempt` entries apply to the whole-tree check,
          # matching every other job (lint / coverage / co-change / mutation).
          CONFIG: ${{ needs.detect.outputs.config || inputs.config }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" unit colocated-test --language "$LANGUAGE" --config "$CONFIG" "$SCAN_PATH"

  colocated-test-changed:
    name: Colocated test — co-change (${{ matrix.language }})
    needs: detect
    # Diff-scoped co-change (#161): on a PR, a modified or deleted source whose
    # colocated test didn't co-change fails. Rust is excluded by the rule (inline
    # `#[cfg(test)]` units can't go stale), so this rides the python/typescript
    # `languages` set. PR-only — it needs a base ref and full history. Rides the
    # colocated-test gate: a gate's diff-scoped variant travels with it (#262).
    if: ${{ github.event_name == 'pull_request' && (inputs.gates == '' || contains(inputs.gates, '"colocated-test"')) && needs.detect.outputs.languages != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.languages) }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Co-change diffs `<base>...HEAD`, so the base ref must be reachable.
          fetch-depth: 0
      - name: Check co-change vs ${{ inputs.base }}
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          CONFIG: ${{ needs.detect.outputs.config || inputs.config }}
          BASE: ${{ inputs.base }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" unit colocated-test --language "$LANGUAGE" --base "$BASE" --config "$CONFIG" "$SCAN_PATH"

  unit-lint:
    name: Unit lint (${{ matrix.language }})
    needs: detect
    # `unit lint` is a static AST check (no language toolchain), like
    # colocated-test — a cheap matrix job, not a toolchain-heavy one like coverage.
    # It enforces the rule for Python (#42), TypeScript (#43/#76/#77), and Rust (#44).
    # The matrix is `isolation_languages` — the requested-and-present set, which
    # (unlike `languages`) includes rust — so a requested-but-absent language is
    # skipped, not failed. #56 (config-driven `check`) will later drive which
    # rules/languages run here; a `gates` allowlist that leaves unit-lint out
    # skips the job (#262).
    if: ${{ (inputs.gates == '' || contains(inputs.gates, '"unit-lint"')) && needs.detect.outputs.isolation_languages != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.isolation_languages) }}
    steps:
      - uses: actions/checkout@v6
      - name: Check unit lint
        # Static check — just the binary via npx, no toolchain. `--config` applies
        # the #102 `[[<language>.exempt]]` waivers, like the other unit jobs.
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          CONFIG: ${{ needs.detect.outputs.config || inputs.config }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" unit lint --language "$LANGUAGE" --config "$CONFIG" "$SCAN_PATH"

  unit-coverage:
    name: Unit-test coverage (${{ matrix.language }})
    needs: detect
    # `unit coverage` enforces the Python (#26), TypeScript (#31), and Rust (#37)
    # floors. The matrix is `coverage_languages` — the requested languages with
    # sources present (#94), plus rust whenever a crate is here (Rust coverage is
    # zero-config now, `lines = 100` by default, #206) — so a requested-but-absent
    # language is skipped rather than erroring. #56 (config-driven `check`) will
    # eventually drive this from the config file. A `gates` allowlist that leaves
    # unit-coverage out skips the job (#262).
    if: ${{ (inputs.gates == '' || contains(inputs.gates, '"unit-coverage"')) && needs.detect.outputs.coverage_languages != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.coverage_languages) }}
    steps:
      - uses: actions/checkout@v6
      # Unlike the static colocated-test / lint checks, `unit coverage` shells out
      # to the language's coverage tool — so its toolchain, and the project's own
      # test deps, must be present. Rust provisioning comes first (#278): `uv sync`
      # and an npm `prepare` script may themselves compile a Rust core, so cargo must
      # already be on PATH before the language-env steps below run.
      - if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - if: matrix.language == 'rust'
        name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      # Provision cargo for a build the package manifest declares — a maturin/PyO3 or
      # napi-rs build compiling a Rust core — in the python/typescript arms too (the
      # rust arm already set its own up above): auto-derived from the package root's
      # own manifest (`provision_rust`, #277), or forced by the manual `rust_toolchain`
      # override (#263) for a build no manifest field expresses. Plus a cargo registry
      # + target cache (keyed at the package root) so the core isn't recompiled from
      # scratch every run.
      - if: (inputs.rust_toolchain || needs.detect.outputs.provision_rust == 'true') && matrix.language != 'rust'
        uses: dtolnay/rust-toolchain@stable
      - if: inputs.rust_toolchain || needs.detect.outputs.provision_rust == 'true'
        name: Cache the Rust build (cargo registry + target)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ needs.detect.outputs.package_root }}/target
          key: rust-toolchain-build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rust-toolchain-build-${{ runner.os }}-
      - if: matrix.language == 'python' && (needs.detect.outputs.python_env || 'pip') == 'pip'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - if: matrix.language == 'python' && (needs.detect.outputs.python_env || 'pip') == 'pip'
        name: Install coverage toolchain (coverage.py + pytest)
        run: python -m pip install --quiet coverage pytest
      # A package root whose pyproject.toml carries a [project] table (python_env ==
      # 'uv', #277) is an installable project with its own dependencies: `uv sync`
      # installs them AND builds/installs the project itself, so a maturin package's
      # native module compiles right here (cargo already provisioned above) — zero
      # config, no build_command / rust_toolchain needed.
      - if: matrix.language == 'python' && (needs.detect.outputs.python_env || 'pip') == 'uv'
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
      - if: matrix.language == 'python' && (needs.detect.outputs.python_env || 'pip') == 'uv'
        name: Provision the project environment (uv)
        working-directory: ${{ needs.detect.outputs.package_root }}
        run: |
          set -euo pipefail
          uv sync
          uv pip install coverage pytest
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
      # TypeScript shells out to vitest, so install the project's own deps — the
      # manager (pnpm or npm, #277) and the install location (the package root, #278)
      # are both derived from the package's own manifest/lockfile, so a
      # per-package-lockfile monorepo package installs correctly with no config.
      - if: matrix.language == 'typescript' && (needs.detect.outputs.ts_package_manager || 'pnpm') == 'pnpm'
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - if: matrix.language == 'typescript'
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - if: matrix.language == 'typescript'
        name: Install project dependencies
        working-directory: ${{ needs.detect.outputs.package_root }}
        env:
          PM: ${{ needs.detect.outputs.ts_package_manager || 'pnpm' }}
        run: |
          set -euo pipefail
          if [ "$PM" = "pnpm" ]; then pnpm install --frozen-lockfile; else npm ci; fi
      # Build a caller-supplied native module the manifest can't express before the
      # suite imports it (#243): the escape hatch for a build not covered by the
      # auto-derivation above. Runs at the package root (#278), like the install
      # steps. Passed via env (not interpolated into `run`) and `eval`-ed so a full
      # shell string — `uv run maturin develop`, `pnpm build`, `a && b` — works.
      - if: inputs.build_command != ''
        name: Run the build step (build_command)
        working-directory: ${{ needs.detect.outputs.package_root }}
        env:
          BUILD_COMMAND: ${{ inputs.build_command }}
        run: |
          set -euo pipefail
          eval "$BUILD_COMMAND"
      - name: Check unit-test coverage
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          CONFIG: ${{ needs.detect.outputs.config || inputs.config }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" unit coverage --language "$LANGUAGE" --config "$CONFIG" "$SCAN_PATH"

  coverage-changed:
    name: Unit-test coverage — changed lines (${{ matrix.language }})
    needs: detect
    # Diff-scoped changed-line coverage (#162): on a PR, the configured floor is
    # measured over only the `<base>...HEAD` changed lines, so a changed line below
    # the floor fails no matter how small the diff. Mirrors the whole-tree
    # unit-coverage job's per-language toolchain setup; PR-only (needs the base ref).
    # Rides the unit-coverage gate: a gate's diff-scoped variant travels with it (#262).
    if: ${{ github.event_name == 'pull_request' && (inputs.gates == '' || contains(inputs.gates, '"unit-coverage"')) && needs.detect.outputs.coverage_languages != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.coverage_languages) }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Changed-line coverage diffs `<base>...HEAD`, so the base ref must be
          # reachable.
          fetch-depth: 0
      # Mirrors the whole-tree unit-coverage job's setup order and derivation (#278):
      # Rust provisioning first (`uv sync` / an npm `prepare` script may compile a
      # Rust core), then the language env, then `build_command` — all at the
      # #277-derived package root.
      - if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - if: matrix.language == 'rust'
        name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      # Provision cargo for a build the package manifest declares, or the manual
      # `rust_toolchain` override for a build no manifest field expresses (#263/#277),
      # as in the whole-tree coverage job — plus the registry + target cache, keyed at
      # the package root.
      - if: (inputs.rust_toolchain || needs.detect.outputs.provision_rust == 'true') && matrix.language != 'rust'
        uses: dtolnay/rust-toolchain@stable
      - if: inputs.rust_toolchain || needs.detect.outputs.provision_rust == 'true'
        name: Cache the Rust build (cargo registry + target)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ needs.detect.outputs.package_root }}/target
          key: rust-toolchain-build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rust-toolchain-build-${{ runner.os }}-
      - if: matrix.language == 'python' && (needs.detect.outputs.python_env || 'pip') == 'pip'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - if: matrix.language == 'python' && (needs.detect.outputs.python_env || 'pip') == 'pip'
        name: Install coverage toolchain (coverage.py + pytest)
        run: python -m pip install --quiet coverage pytest
      # A package root with a [project] table (python_env == 'uv', #277): `uv sync`
      # installs the project's own dependencies and builds/installs the project
      # itself, as in the whole-tree coverage job.
      - if: matrix.language == 'python' && (needs.detect.outputs.python_env || 'pip') == 'uv'
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
      - if: matrix.language == 'python' && (needs.detect.outputs.python_env || 'pip') == 'uv'
        name: Provision the project environment (uv)
        working-directory: ${{ needs.detect.outputs.package_root }}
        run: |
          set -euo pipefail
          uv sync
          uv pip install coverage pytest
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
      - if: matrix.language == 'typescript' && (needs.detect.outputs.ts_package_manager || 'pnpm') == 'pnpm'
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - if: matrix.language == 'typescript'
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - if: matrix.language == 'typescript'
        name: Install project dependencies
        working-directory: ${{ needs.detect.outputs.package_root }}
        env:
          PM: ${{ needs.detect.outputs.ts_package_manager || 'pnpm' }}
        run: |
          set -euo pipefail
          if [ "$PM" = "pnpm" ]; then pnpm install --frozen-lockfile; else npm ci; fi
      # Build a caller-supplied native module before the suite imports it (#243), as in the
      # whole-tree coverage job; empty `build_command` ⇒ skipped. Runs at the package root
      # (#278).
      - if: inputs.build_command != ''
        name: Run the build step (build_command)
        working-directory: ${{ needs.detect.outputs.package_root }}
        env:
          BUILD_COMMAND: ${{ inputs.build_command }}
        run: |
          set -euo pipefail
          eval "$BUILD_COMMAND"
      - name: Check changed-line coverage vs ${{ inputs.base }}
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          CONFIG: ${{ needs.detect.outputs.config || inputs.config }}
          BASE: ${{ inputs.base }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" unit coverage --language "$LANGUAGE" --base "$BASE" --config "$CONFIG" "$SCAN_PATH"

  mutation:
    name: Unit mutation — changed lines (${{ matrix.language }})
    needs: detect
    # `unit mutation` (#204) — the rung above coverage: a test that *runs* a changed
    # line still passes if you delete its assertions, and a surviving mutant proves it.
    # The gate is binary and on by default (no report-only mode): an un-exempted survivor
    # on a changed line fails the build, with reasoned `[[<lang>.exempt]] rules =
    # ["mutation"]` entries the only loosening. Whole-tree mutation is too slow to gate,
    # so this is **PR-only and diff-scoped** (`--base`, like coverage-changed) — only the
    # mutants on the `<base>...HEAD` changed lines are run. The matrix is
    # `mutation_languages` (the coverage set; all three arms are at parity, #201/#202/#203).
    # `mutation_languages` is a new detect output, so until a release moves `@v0` to a
    # detect that emits it (this PR's own run still pins the old `@v0`), it's empty — fall
    # back to `coverage_languages` (the identical set) so the matrix stays valid. A `gates`
    # allowlist that leaves mutation out skips the job (#262).
    if: ${{ github.event_name == 'pull_request' && (inputs.gates == '' || contains(inputs.gates, '"mutation"')) && (needs.detect.outputs.mutation_languages || needs.detect.outputs.coverage_languages) != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.mutation_languages || needs.detect.outputs.coverage_languages) }}
    steps:
      - uses: actions/checkout@v6
        with:
          # `--base` diffs `<base>...HEAD`, so the base ref must be reachable.
          fetch-depth: 0
      # Provision cargo (+ cache) for a build_command that compiles a Rust core (#263)
      # BEFORE the language-env steps below — a maturin/PyO3 build triggered by `uv sync`
      # (not just an explicit `build_command`) needs cargo already on PATH. Auto-provisions
      # whenever the package root's own manifest declares a Rust-compiling build too
      # (detect's `provision_rust`, #277), not only when the caller passes `rust_toolchain`;
      # the rust arm sets its own toolchain up below, so skip it here. `target` caches under
      # the package root (#279), mirroring the coverage jobs (#278).
      - if: (inputs.rust_toolchain || needs.detect.outputs.provision_rust == 'true') && matrix.language != 'rust'
        uses: dtolnay/rust-toolchain@stable
      - if: inputs.rust_toolchain || needs.detect.outputs.provision_rust == 'true'
        name: Cache the Rust build (cargo registry + target)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ needs.detect.outputs.package_root }}/target
          key: rust-toolchain-build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rust-toolchain-build-${{ runner.os }}-
      # Like coverage, `unit mutation` shells out to the language's mutation engine, so
      # its toolchain — and the project's own test deps — must be present. Set up per
      # language, installed from the derived package root (#279) so a monorepo's
      # per-package lockfile/manifest is the one that's read. #56 (config-driven `check`)
      # will eventually drive this from config.
      - if: matrix.language == 'python' && (needs.detect.outputs.python_env || 'pip') == 'pip'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - if: matrix.language == 'python' && (needs.detect.outputs.python_env || 'pip') == 'pip'
        name: Install the Python mutation toolchain (wheel + pytest)
        # `unit mutation --language python` spawns the adapter shipped in the wheel
        # (`python3 -m testing_conventions.mutation.main`, #248); installing the wheel puts
        # that module on the path and brings cosmic-ray as a dependency. pytest runs the
        # project's suite. (#258 — cosmic-ray alone left the adapter module unresolvable.)
        # The wheel is named last so the subcommand-drift guard (#92) doesn't read the
        # package that follows the binary name as a `testing-conventions` invocation.
        run: python -m pip install --quiet pytest testing-conventions
      # A `uv`-managed package (detect's python_env, #277) gets its own dependencies too:
      # `uv sync` installs (and, for a maturin project, builds) the project itself — the
      # cargo toolchain above is already on PATH for that build — then the adapter wheel
      # and pytest go INTO that same venv (not global pip) so cosmic-ray's spawned pytest
      # can import both the project's own dependencies and the adapter (#279). Wheel named
      # last, same #92 drift-guard reason as the pip install above.
      - if: matrix.language == 'python' && (needs.detect.outputs.python_env || 'pip') == 'uv'
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
      - if: matrix.language == 'python' && (needs.detect.outputs.python_env || 'pip') == 'uv'
        name: Provision the project environment (uv)
        working-directory: ${{ needs.detect.outputs.package_root }}
        run: |
          set -euo pipefail
          uv sync
          uv pip install pytest testing-conventions
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
      # TypeScript drives Stryker, which runs the project's test runner — install the
      # project's deps (which must include @stryker-mutator/core and a runner plugin) with
      # whichever package manager the package root's own manifest/lockfile names (#279):
      # `pnpm/action-setup` only when it's pnpm, so an npm-only package doesn't require it.
      - if: matrix.language == 'typescript' && (needs.detect.outputs.ts_package_manager || 'pnpm') == 'pnpm'
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - if: matrix.language == 'typescript'
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - if: matrix.language == 'typescript'
        name: Install project dependencies
        working-directory: ${{ needs.detect.outputs.package_root }}
        env:
          PM: ${{ needs.detect.outputs.ts_package_manager || 'pnpm' }}
        run: |
          set -euo pipefail
          if [ "$PM" = "pnpm" ]; then pnpm install --frozen-lockfile; else npm ci; fi
      # Rust drives cargo-mutants over the crate. The published CLI provisions the engine
      # itself now (#242) — a pinned `cargo install` into its cache on first use — so only the
      # cargo toolchain is set up here; cache that dir so the from-source install is reused.
      - if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable
      - if: matrix.language == 'rust'
        name: Cache the provisioned cargo-mutants
        uses: actions/cache@v4
        with:
          path: ~/.cache/testing-conventions
          key: cargo-mutants-provision-${{ runner.os }}
      # Build a caller-supplied native module before the mutation engine runs the suite
      # (#243): cosmic-ray / Stryker / cargo-mutants import the same module, so it must be
      # compiled here too; empty `build_command` ⇒ skipped. Runs at the derived package
      # root (#279) — breaking for a monorepo consumer whose command assumed the checkout
      # root (packages/rust/MIGRATIONS.md).
      - if: inputs.build_command != ''
        name: Run the build step (build_command)
        working-directory: ${{ needs.detect.outputs.package_root }}
        env:
          BUILD_COMMAND: ${{ inputs.build_command }}
        run: |
          set -euo pipefail
          eval "$BUILD_COMMAND"
      - name: Check mutation on the lines changed vs ${{ inputs.base }}
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          CONFIG: ${{ needs.detect.outputs.config || inputs.config }}
          BASE: ${{ inputs.base }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" unit mutation --language "$LANGUAGE" --base "$BASE" --config "$CONFIG" "$SCAN_PATH"

  integration-lint:
    name: Integration lint (${{ matrix.language }})
    needs: detect
    # `integration lint` (mocking mechanism & style) ships for Python (#58),
    # TypeScript (#43/#75), and Rust (#44), so the matrix fans out over every
    # requested language with sources present — the `integration_lint_languages` set,
    # which adds rust on top of the colocated languages (#126). Skipped — not
    # failed — when that set is empty, or when a `gates` allowlist leaves
    # integration-lint out (#262). #56 (config-driven `check`) will eventually
    # drive which rules/languages run here.
    if: ${{ (inputs.gates == '' || contains(inputs.gates, '"integration-lint"')) && needs.detect.outputs.integration_lint_languages != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.integration_lint_languages) }}
    steps:
      - uses: actions/checkout@v6
      - name: Lint integration tests
        # `--config` so a consumer's #102 waivers are honored, matching the
        # unit-coverage job (an absent file waives nothing).
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          CONFIG: ${{ needs.detect.outputs.config || inputs.config }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" integration lint --language "$LANGUAGE" --config "$CONFIG" "$SCAN_PATH"

  e2e-verify:
    name: E2E attestation freshness (e2e verify)
    needs: detect
    # Default-on, verify-if-present (#186): run the #68 freshness gate whenever a
    # committed `e2e-attestation.json` is present (detected by the detect action) —
    # verify it names the latest code commit, failing (with a re-attest nudge) when the
    # code has moved on. A repo with no attestation is skipped, never failed; `run_e2e`
    # forces the job on. Never runs the e2e suite itself. The `gates` allowlist is
    # authoritative (#262): checked first, so a scoped call that leaves e2e-verify out
    # skips the job even when `run_e2e` is set.
    if: ${{ (inputs.gates == '' || contains(inputs.gates, '"e2e-verify"')) && (inputs.run_e2e || needs.detect.outputs.e2e_attestation == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # `e2e verify` finds the latest code commit via `git log`, so it needs
          # full history — a shallow clone would miss it. On a pull_request event
          # the default ref is the ephemeral merge commit, which an attestation
          # can never name (it's rebuilt fresh on every push to the base or the
          # PR); check out the PR's actual head commit instead, falling back to
          # the triggering commit for a push/other event where there is no PR.
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Verify the e2e attestation is current
        env:
          VERSION: ${{ inputs.version }}
          PACKAGE_ROOT: ${{ needs.detect.outputs.package_root }}
        # The attestation file lives at the derived package root (#281), matching
        # `detect`'s package-scoped `e2e_attestation` flag above. #294 adds a
        # `--scope` flag so the freshness walk can be narrower than the package
        # root; wiring this job to pass it is a follow-up PR, landed only once a
        # release has published the flag (see AGENTS.md, "Two-step rollout for
        # workflow-consumed CLI changes") — wiring it here, in the same PR that
        # adds the flag, would make this job's own dogfood run fail against the
        # not-yet-published binary.
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" e2e verify "$PACKAGE_ROOT"

  packaging:
    name: Packaging (no test files in the built artifact)
    needs: detect
    # Default-on, locate-or-skip (#186): packaging inspects the *built distribution*, not
    # the source tree, so it doesn't ride the source matrix — but it runs by default. It
    # runs when an explicit `packaging_artifact` was uploaded OR the detect action found a
    # conventional dist/ at the derived package root (#280; the checkout root for every
    # single-package consumer), and is skipped — never failed — when neither exists. Each
    # distribution's language is inferred from its extension. The `gates` allowlist is
    # authoritative (#262): checked first, so a scoped call that leaves packaging out
    # skips the job even when `packaging_artifact` is set.
    if: ${{ (inputs.gates == '' || contains(inputs.gates, '"packaging"')) && (inputs.packaging_artifact != '' || needs.detect.outputs.packaging_dist == 'true') }}
    runs-on: ubuntu-latest
    steps:
      # Acquire the distributions one of two ways: a named upload artifact, or the
      # committed dist/ in the consumer checkout (#186).
      - name: Download the uploaded distributions
        if: inputs.packaging_artifact != ''
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.packaging_artifact }}
          path: _packaging_artifact
      - name: Check out the repository to inspect its dist/
        if: inputs.packaging_artifact == ''
        uses: actions/checkout@v6
      - name: Check the built distributions ship no test files
        env:
          VERSION: ${{ inputs.version }}
          PACKAGING_ARTIFACT: ${{ inputs.packaging_artifact }}
          PACKAGE_ROOT: ${{ needs.detect.outputs.package_root }}
        run: |
          set -euo pipefail
          # nullglob: an unmatched glob expands to nothing (not the literal);
          # globstar: `**` recurses, so a nested dist is found too.
          shopt -s nullglob globstar
          # The downloaded artifact when one was named, else the located dist/ at the
          # derived package root (#280 — "." for a single-package repo, so this is
          # `./dist`, byte-identical to today's `dist`).
          if [ -n "$PACKAGING_ARTIFACT" ]; then dist_root=_packaging_artifact; else dist_root="${PACKAGE_ROOT:-.}/dist"; fi
          # Language is inferred from the distribution's extension: a wheel/sdist is
          # python, an `npm pack` tarball is typescript, a Cargo crate is rust.
          checked=0
          check () {
            local lang="$1"; shift
            for dist in "$@"; do
              echo "::group::packaging --language $lang $dist"
              npx -y "testing-conventions${VERSION:+@$VERSION}" packaging "$dist" --language "$lang"
              echo "::endgroup::"
              checked=$((checked + 1))
            done
          }
          check python "$dist_root"/**/*.whl "$dist_root"/**/*.tar.gz
          check typescript "$dist_root"/**/*.tgz
          check rust "$dist_root"/**/*.crate
          if [ "$checked" -eq 0 ]; then
            echo "::error::no recognized built distribution (.whl / .tar.gz / .tgz / .crate) found in '$dist_root'"
            exit 1
          fi
          echo "checked $checked built distribution(s); no test files shipped"
