name: Testing Conventions

# Reusable workflow: enforce a library's testing conventions in CI.
#
# Call it from a consumer repo, pinned to a tag:
#
#   jobs:
#     conventions:
#       uses: thekevinscott/testing-conventions/.github/workflows/testing-conventions.yml@v0
#       with:
#         languages: '["python", "typescript"]'
#         path: src
#
# It runs the published `testing-conventions` binary via `npx` (a prebuilt,
# per-platform npm package — no Rust toolchain, no compile from source), once
# per rule and language as its own matrix job, failing the build on any
# violation. Today that is the unit-test colocated-test check (every language),
# the unit-test coverage floor (Python and TypeScript), and the integration-test
# lint (mocking mechanism & style, Python, TypeScript, and Rust); as more rules
# land they run here too.
#
# A `detect` pre-step scans `path` for each requested language's sources, and the
# rule jobs fan out over the languages that are both requested *and* present
# (#94). A requested language the library has no sources for — e.g. the
# zero-config default ["python", "typescript"] against a repo with no `.py` — is
# dropped from the matrix and skipped, not failed: its coverage job would
# otherwise error on an empty measurement (pytest collects nothing; an empty
# vitest denominator is a failed run).
#
# The Packaging rule (#41) is the exception: it inspects the *built distribution*,
# not the source tree, so it doesn't ride the source matrix. Build your dists in
# your own job, upload them with actions/upload-artifact, and pass that artifact's
# name as `packaging_artifact` — the packaging job downloads it and fails if any
# .whl/.tar.gz (python), .tgz (typescript), or .crate (rust) ships a test file:
#
#   jobs:
#     build:
#       runs-on: ubuntu-latest
#       steps:
#         - run: python -m build            # → dist/*.whl, dist/*.tar.gz
#         - uses: actions/upload-artifact@v4
#           with: { name: dist, path: dist/ }
#     conventions:
#       needs: build
#       uses: thekevinscott/testing-conventions/.github/workflows/testing-conventions.yml@v0
#       with:
#         packaging_artifact: dist
#
# No config file is required: every check runs with sane defaults, opting a new
# library into the full set in one drop-in (#80). The coverage floor falls back
# to the language's reasonable default — Python: branch on, 85; TypeScript:
# lines/functions/statements 80, branches 75 — when no `testing-conventions.toml`
# is present. Add a config file only to tighten a floor or declare exemptions.
#
# `languages` is a JSON array so the matrix can fan out over it directly
# (reusable-workflow inputs can't be native lists). Once the config-driven
# `check` umbrella is wired this will read the config file itself.

on:
  workflow_call:
    inputs:
      languages:
        description: 'JSON array of languages to check, e.g. ["python", "typescript"].'
        type: string
        default: '["python", "typescript"]'
      path:
        description: 'Directory scanned recursively for sources.'
        type: string
        default: 'src'
      version:
        description: 'testing-conventions version to run, e.g. 0.1.0 (default: latest from npm).'
        type: string
        default: ''
      config:
        description: 'Optional config file to refine the checks (coverage thresholds, exemptions). If absent, every check runs with sane defaults.'
        type: string
        default: 'testing-conventions.toml'
      packaging_artifact:
        description: 'Name of an uploaded build artifact (actions/upload-artifact) holding the built distributions (.whl/.tar.gz/.tgz/.crate) to check. When set, a packaging job downloads it and fails if any distribution ships a test file. Empty (default) skips the packaging check.'
        type: string
        default: ''

permissions:
  contents: read

jobs:
  detect:
    name: Detect requested languages with sources
    runs-on: ubuntu-latest
    outputs:
      # JSON array of the requested languages with sources under `path` — the matrix
      # the colocated-test and unit-coverage jobs fan out over (python, typescript).
      languages: ${{ steps.scan.outputs.languages }}
      # The same set, additionally covering rust — the matrix the integration-lint
      # job fans out over (#126). Kept separate from `languages` so the coverage
      # matrix is unchanged: `unit coverage` has no rust arm and would error on it.
      integration_lint_languages: ${{ steps.scan.outputs.integration_lint_languages }}
    steps:
      - uses: actions/checkout@v6
      - id: scan
        name: Scan ${{ inputs.path }} for each requested language's sources
        env:
          LANGUAGES: ${{ inputs.languages }}
          SCAN_PATH: ${{ inputs.path }}
        run: |
          set -euo pipefail
          # The "cheap pre-step" (#94): a language's jobs should fire only when it
          # was requested *and* `path` actually holds sources for it. colocated-test
          # and integration-lint pass vacuously on an absent language, but `unit
          # coverage` has nothing to measure and errors (pytest collects nothing; an
          # empty vitest denominator is a failed run) — so a requested-but-absent
          # language is dropped here and skipped, not failed. Detection covers the
          # languages the workflow's checks support: python/typescript for
          # colocated-test & coverage, plus rust for integration-lint (#126).
          #
          # `set -f` so the shell leaves the *.ext globs for `find` to match itself.
          set -f
          present=()
          # $1 = language; $2.. = the find name-predicates for its sources. Adds the
          # language only when it was requested and a matching source file exists.
          scan () {
            local lang="$1"; shift
            case "$LANGUAGES" in
              *"\"$lang\""*) ;;   # requested
              *) return ;;        # not requested — never in the matrix
            esac
            if [ -n "$(find "$SCAN_PATH" -type f \( "$@" \) -print -quit 2>/dev/null)" ]; then
              present+=("$lang")
            fi
          }
          # colocated-test + unit-coverage fan out over python/typescript.
          scan python -name '*.py'
          scan typescript -name '*.ts' -o -name '*.tsx' -o -name '*.mts' -o -name '*.cts'
          # The integration-lint matrix is the same set plus rust (#126), which only
          # that check supports — a Cargo.toml or any *.rs marks a crate. Built on top
          # of `present` so rust never enters the coverage matrix.
          lint=("${present[@]}")
          case "$LANGUAGES" in
            *'"rust"'*)
              if [ -n "$(find "$SCAN_PATH" -type f \( -name 'Cargo.toml' -o -name '*.rs' \) -print -quit 2>/dev/null)" ]; then
                lint+=("rust")
              fi
              ;;
          esac
          # Emit each as a compact JSON array (`[]` when nothing matched).
          to_json () {
            local json='[' first=1 x
            for x in "$@"; do
              [ "$first" -eq 1 ] && first=0 || json+=','
              json+="\"$x\""
            done
            printf '%s]' "$json"
          }
          languages_json="$(to_json "${present[@]}")"
          lint_json="$(to_json "${lint[@]}")"
          {
            echo "languages=$languages_json"
            echo "integration_lint_languages=$lint_json"
          } >> "$GITHUB_OUTPUT"
          echo "requested $LANGUAGES under '$SCAN_PATH' → coverage/colocated $languages_json, integration-lint $lint_json"

  colocated-test:
    name: Colocated test (${{ matrix.language }})
    needs: detect
    # Only the requested languages with sources present (#94); skip the job
    # entirely when that leaves nothing.
    if: needs.detect.outputs.languages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.languages) }}
    steps:
      - uses: actions/checkout@v6
      - name: Check colocated test
        # node/npx ship on ubuntu-latest; `-y` skips the install prompt and
        # `${VERSION:+@...}` pins the version only when one was requested.
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" unit colocated-test --language "$LANGUAGE" "$SCAN_PATH"

  unit-coverage:
    name: Unit-test coverage (${{ matrix.language }})
    needs: detect
    # `unit coverage` enforces the Python (#26) and TypeScript (#31) floors today
    # (other languages — e.g. rust — are a separate item). The matrix is the
    # requested languages with sources present (#94), so a requested-but-absent
    # language is skipped rather than erroring on an empty measurement. #56
    # (config-driven `check`) will eventually drive this from the config file.
    if: needs.detect.outputs.languages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.languages) }}
    steps:
      - uses: actions/checkout@v6
      # Unlike the static colocated-test / lint checks, `unit coverage` shells out
      # to the language's coverage tool — so its toolchain, and the project's own
      # test deps, must be present. Set up per language.
      - if: matrix.language == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - if: matrix.language == 'python'
        name: Install coverage toolchain (coverage.py + pytest)
        run: python -m pip install --quiet coverage pytest
      # TypeScript shells out to vitest, so install the project's deps (including
      # vitest + @vitest/coverage-v8) with pnpm, the TS convention. A project on a
      # different package manager should drive the CLI directly until #56 makes
      # this config-driven.
      - if: matrix.language == 'typescript'
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - if: matrix.language == 'typescript'
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - if: matrix.language == 'typescript'
        name: Install project dependencies (pnpm)
        run: pnpm install --frozen-lockfile
      - name: Check unit-test coverage
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          CONFIG: ${{ inputs.config }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" unit coverage --language "$LANGUAGE" --config "$CONFIG" "$SCAN_PATH"

  integration-lint:
    name: Integration lint (${{ matrix.language }})
    needs: detect
    # `integration lint` (mocking mechanism & style) ships for Python (#58),
    # TypeScript (#43/#75), and Rust (#44), so the matrix fans out over every
    # requested language with sources present — the `integration_lint_languages` set,
    # which adds rust on top of the coverage/colocated languages (#126). Skipped —
    # not failed — when that set is empty. #56 (config-driven `check`) will eventually
    # drive which rules/languages run here.
    if: needs.detect.outputs.integration_lint_languages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.integration_lint_languages) }}
    steps:
      - uses: actions/checkout@v6
      - name: Lint integration tests
        # `--config` so a consumer's #102 waivers are honored, matching the
        # unit-coverage job (an absent file waives nothing).
        env:
          LANGUAGE: ${{ matrix.language }}
          SCAN_PATH: ${{ inputs.path }}
          VERSION: ${{ inputs.version }}
          CONFIG: ${{ inputs.config }}
        run: npx -y "testing-conventions${VERSION:+@$VERSION}" integration lint --language "$LANGUAGE" --config "$CONFIG" "$SCAN_PATH"

  packaging:
    name: Packaging (no test files in the built artifact)
    # Unlike the checks above, packaging inspects the *built distribution*, not the
    # source tree — so it doesn't fan out over `detect`'s source matrix. The
    # consumer's own build job uploads its built dists (actions/upload-artifact) and
    # passes that artifact's name as `packaging_artifact`; this job downloads it and
    # checks each file, inferring the language from the extension. Skipped — never
    # failed — when no `packaging_artifact` is given.
    if: inputs.packaging_artifact != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download the built distributions
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.packaging_artifact }}
          path: _packaging_artifact
      - name: Check the built distributions ship no test files
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          # nullglob: an unmatched glob expands to nothing (not the literal);
          # globstar: `**` recurses, so a nested dist is found too.
          shopt -s nullglob globstar
          # Language is inferred from the distribution's extension: a wheel/sdist is
          # python, an `npm pack` tarball is typescript, a Cargo crate is rust.
          checked=0
          check () {
            local lang="$1"; shift
            for dist in "$@"; do
              echo "::group::packaging --language $lang $dist"
              npx -y "testing-conventions${VERSION:+@$VERSION}" packaging "$dist" --language "$lang"
              echo "::endgroup::"
              checked=$((checked + 1))
            done
          }
          check python _packaging_artifact/**/*.whl _packaging_artifact/**/*.tar.gz
          check typescript _packaging_artifact/**/*.tgz
          check rust _packaging_artifact/**/*.crate
          if [ "$checked" -eq 0 ]; then
            echo "::error::packaging_artifact '${{ inputs.packaging_artifact }}' held no recognized built distribution (.whl / .tar.gz / .tgz / .crate)"
            exit 1
          fi
          echo "checked $checked built distribution(s); no test files shipped"
