name: Verify release (tests)

# Red/green tests for the repo-only validated-promotion helper
# (.github/scripts/verify-release, #357). The version-resolution, archive-layout, and
# dispatch/poll logic lives in verify_release.py — not inline in the verify-and-promote workflow —
# so it carries integration tests (the git/gh boundary mocked) and e2e tests (a real git repo with
# real tags), run with pytest. This is the gate that goes red before the logic lands and green
# after. Mirrors move-major-tag-tests.yml for the tag-move helper.

on:
  pull_request:
    paths:
      - '.github/scripts/verify-release/**'
      - '.github/workflows/verify-release-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: verify_release.py — integration + e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install pytest
        run: python -m pip install --quiet pytest
      - name: Unit + integration + e2e tests
        run: python -m pytest .github/scripts/verify-release/ -v --import-mode=importlib
