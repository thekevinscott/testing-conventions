# job_block.py:50 (#356) computes each job's end boundary as
# `headers[i + 1].start() if i + 1 < len(headers) else len(text)`, with `i` bound only by
# `enumerate(headers)` — never a function parameter or otherwise externally reachable. So
# `i + 1` can never exceed `len(headers)` on any execution: `i` ranges 0..len(headers)-1, making
# `i + 1` range 1..len(headers) exactly. Under that invariant, `i + 1 < len(headers)` and
# `i + 1 != len(headers)` (the NotEq mutant) evaluate identically for every reachable `i` — the
# only value that could separate them, `i + 1 > len(headers)`, is unreachable by construction, not
# merely untested. The IsNot mutant is additionally a CPython small-int-interning equivalent (as
# in hermetic_wired/cli.py's prior exemption, now removed with the code it protected): job counts
# in any real or test workflow file are far below 256, so `!=` and `is not` already return
# identical results for every reachable pair before the loop-invariant argument even applies.
# Tried: constructing a headers list where i+1 exceeds len(headers) — impossible without hand-
# building a fake `_JOB_HEADER.finditer` result bypassing `enumerate` entirely, which would test
# a contract this function doesn't have, not this comparison. The sibling Add_LShift mutant
# (`i + 1` -> `i << 1`) on the same line is a real gap and is killed by
# test_iter_job_blocks_yields_every_job_bounded_to_its_own_region's assertions on the *first*
# job's own block.
[[python.exempt]]
path = "checks/utils/job_block.py"
rules = ["mutation"]
lines = ["50"]
reason = "i + 1 < len(headers) on job_block.py:50: i is bound only by enumerate(headers), so i + 1 can never exceed len(headers) on any reachable execution, making the NotEq mutant (i + 1 != len(headers)) behaviorally identical to < for every input — and the IsNot mutant additionally equivalent via CPython's small-int interning (job counts are always far below 256). Neither is killable without fabricating an unreachable i, which would test a contract this function doesn't have. The sibling Add_LShift mutant on the same line is a real gap, killed by asserting on the first job's own block boundary."

# verify_release.py:125, :131 (#357) are the two subprocess boundary calls — the `_run_text` /
# `_run_bytes` helpers every git/gh operation routes through. The `capture_output=True` / `text=True`
# flags are the mutation-survivors: their effect is entirely inside `subprocess.run` (stdout captured
# and decoded), so an *injected* `run` fake — the only way to test this repo-only helper, since its
# `gh` boundary can't be run for real in CI — cannot observe them being flipped; the fake returns its
# canned stdout regardless. Killing them would mean building a fake that re-implements subprocess.run's
# capture/text contract, i.e. testing the standard library, not this code. Everything else in the
# helpers is killed for real: the nonzero-exit raise (`if result.returncode:`, via signal/exit tests),
# and every parse and decision downstream. This is the `build_hermetic_cli` case — a boundary CI can't
# exercise — which is why the helper lives here (exemptions available) rather than `.github/scripts`.
[[python.exempt]]
path = "checks/utils/verify_release.py"
rules = ["mutation"]
lines = ["125", "131"]
reason = "capture_output=True / text=True on the two subprocess boundary calls (_run_text/_run_bytes): their effect lives inside subprocess.run, unobservable through the injected `run` fake this repo-only helper is tested with (its gh boundary can't run for real in CI), so flipping them changes nothing a fake can see — killing them would test subprocess.run's own capture/text contract, not this code. The returncode raise and all parsing/decisions are killed for real; this is the build_hermetic_cli boundary-exemption case."

