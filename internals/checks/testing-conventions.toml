# Repo-only checks package config (#321). Coverage/lint floors stay at the zero-config
# defaults (branch coverage on, fail_under = 100); only config.py is exempted.
#
# checks/config.py holds nothing but shared string constants — the workflow paths every check
# imports and the detect fixture expected-outputs the detect-package-root checks assert against
# (the "re-export barrel" exemption case the README names). It has no behavior, so it carries no
# colocated test of its own; with no test to hold, there is likewise no test to co-change:
[[python.exempt]]
path = "checks/config.py"
rules = ["colocated-test", "co-change"]
reason = "constants-only module: shared workflow-path literals and detect fixture expected-outputs, imported by every check; no logic to unit-test (a colocated test could only re-assert the same string), so no colocated test exists to co-change when a constant is edited — a changed fixture constant is caught by the detect-package-root evaluate tests that hardcode it, a changed path literal by the e2e suite"

[[python.exempt]]
path = "checks/config.py"
rules = ["mutation"]
lines = ["4-5"]
reason = "path-string constants; a mutated literal is observable only through a real file read, which lives in the out-of-scope e2e suite (CliRunner over the real workflow), so no in-scope unit test can kill it"

# hermetic_wired/cli.py:93 compares two regex-match counts (`uses != needs`, #356). The `Gt`
# mutant (`uses > needs`) is a real gap, killed by a uses<needs test. The `IsNot` mutant
# (`uses is not needs`) is a genuine CPython equivalent mutant, not an untested gap: both are
# `len(...)` results, and CPython interns every int in -5..256 as a singleton, so for the tiny
# match counts a real workflow file can ever produce, `a != b` and `a is not b` return
# identical results for every reachable input — no assertion, mock, or injection distinguishes
# them (tried: driving the function directly with both under/over/equal-count fixtures, per
# AGENTS.md's technique catalog; none differ, because the underlying values never differ). The
# only way to force different int objects of equal value would be feeding 257+ fabricated
# `uses:`/`needs:` lines purely to escape the interning range — testing CPython's cache
# implementation, not this code's logic.
[[python.exempt]]
path = "checks/hermetic_wired/cli.py"
rules = ["mutation"]
lines = ["93"]
reason = "uses != needs on two len(...) int counts: the IsNot mutant (uses is not needs) is behaviorally identical to != for every count a real workflow file can produce, since CPython interns all ints in -5..256 as singletons — equal small ints are always the same object. Killable only by fabricating 257+ uses:/needs: lines to escape interning, which would test CPython's cache, not this comparison; the Gt mutant (uses > needs) is a real gap and is killed by test_raises_when_a_caller_has_more_needs_edges_than_uses_calls."
