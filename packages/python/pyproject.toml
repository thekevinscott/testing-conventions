[build-system]
# Pinned exactly: the wheel is the shipped artifact, so its build toolchain is a function of
# the commit.
requires = ["maturin==1.14.1"]
build-backend = "maturin"

[project]
name = "testing-conventions"
dynamic = ["version"]
description = "Enforce testing conventions in libraries (Python, TypeScript, and Rust)."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Kevin Scott", email = "me@thekevinscott.com" }]
# The Python mutation/coverage engines ship with the package, so a `pip`/`uvx` install
# of testing-conventions brings them — the rule resolves them from the same environment.
# The test runner (pytest) stays the consumer's: it runs *their* suite, so it's theirs to
# version. Left unpinned so pip backtracks to an interpreter-compatible release across the
# supported 3.9+ range (coverage's latest needs 3.10+).
dependencies = ["cosmic-ray", "coverage"]

[project.urls]
Repository = "https://github.com/thekevinscott/testing-conventions"

[project.entry-points.pytest11]
testing_conventions = "testing_conventions.pytest_plugin.hooks"

[tool.maturin]
manifest-path = "../rust/Cargo.toml"
bindings = "bin"
python-source = "python"
# Colocated unit tests live next to the source; never ship them in the wheel.
exclude = ["**/*_test.py"]
