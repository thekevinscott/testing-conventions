[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "testing-conventions"
dynamic = ["version"]
description = "Enforce testing conventions in libraries (Python, TypeScript, and Rust)."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Kevin Scott", email = "me@thekevinscott.com" }]

[project.urls]
Repository = "https://github.com/thekevinscott/testing-conventions"

[project.entry-points.pytest11]
testing_conventions = "testing_conventions._pytest_plugin"

[tool.maturin]
manifest-path = "../rust/Cargo.toml"
bindings = "bin"
python-source = "python"
# Colocated unit tests live next to the source; never ship them in the wheel.
exclude = ["**/*_test.py"]
