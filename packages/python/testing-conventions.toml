# The only exempted file: the pytest plugin's irreducible glue. The wrapper hook
# and the global coverage monkeypatch can't be exercised without a real pytest +
# coverage run, which the tests/ integration suite does. Everything decidable —
# the config detection (config/detect.py) and the default decision
# (pytest_plugin/plan.py) — is pure, unit-tested, and held to the coverage and
# mutation gates.
[[python.exempt]]
path = "testing_conventions/pytest_plugin/hooks.py"
rules = ["colocated-test", "coverage", "mutation"]
reason = "pytest hook + coverage monkeypatch glue; not exercisable without a live pytest run, covered by tests/pytest_plugin_test.py"

# A version-conditional import (tomllib on 3.11+, tomli before): one branch is
# always dead on a single interpreter, so it can't be covered or mutation-killed.
# Kept to one import with no logic so nothing testable hides behind the exemption.
[[python.exempt]]
path = "testing_conventions/config/tomlcompat.py"
rules = ["colocated-test", "coverage", "mutation"]
reason = "version-conditional tomllib/tomli import; one branch is unreachable on any single interpreter, no logic to test"
