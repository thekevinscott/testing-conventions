# A crate whose integration suite must be found from the crate root even when
# the scanned `path` is `src/`. Parsed by `syn`, never compiled — `[workspace]`
# isolates it from cargo.
[package]
name = "widget"
version = "0.0.0"
edition = "2021"

[dev-dependencies]
mockall = "0.13"
mockall_double = "0.3"

[workspace]
