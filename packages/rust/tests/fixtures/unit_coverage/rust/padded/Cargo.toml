# `padded` fixture for unit-suite scoping (#265): `scale` is fully exercised by
# its colocated inline test, while `shift` is exercised only by the integration
# test under `tests/`. The unit suite alone leaves every `shift` region and line
# unexecuted, so this crate reads well under 100% — a run that also counts the
# integration target reads 100% and passes, which is exactly the padding the
# rule forbids. `[workspace]` isolates the fixture from the parent cargo
# workspace.
[package]
name = "cov_rust_padded"
version = "0.0.0"
edition = "2021"

[workspace]
