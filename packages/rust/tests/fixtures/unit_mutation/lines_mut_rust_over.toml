# Over-exemption (#226 determinism guard): in the killed crate line 6's mutants are all
# caught, so listing it is a hard error — a line-scoped exemption may only name lines
# with a surviving mutant.
[[rust.exempt]]
path = "src/lib.rs"
rules = ["mutation"]
lines = [6]
reason = "fixture: over-exempts a caught line"
